  equation: \text{i}\frac{d}{dt}|\psi(t)\rangle=H_{\text{s}}(t)|\psi(t)\rangle
  window: We conclude with a discussion of the physical meaning behind the recurrence in open systems and give the direction of recurrence theorem not limited to conservative systems in classical mechanics. For an open quantum system governed by Hamiltonian H_{\text{s}}(t) , which is NH, arbitrary dimensional and time-dependent in general, we can always extend H_{\text{s}}(t) to a Hermitian one by introducing an ancilla qubit Wu et al. ( 2019 ) . With the state evolution of NH system satisfying (in units \hbar=1 ) <starteqn> \text{i}\frac{d}{dt}|\psi(t)\rangle=H_{\text{s}}(t)|\psi(t)\rangle <endeqn> When a measurement is applied on the ancilla qubit and |-\rangle is postselected, the system evolution governed by the NH Hamiltonian H_{\text{s}}(t) can be produced Ozawa ( 1984 ) . If H_{\text{tot}} is time-independent, we can apply the quantum recurrence theorem for closed quantum systems to it and we know the extended Hermitian system returns to a state arbitrarily close to its initial state after a finite time, and the NH system obtained by the projection of the extended Hermitian system also returns to a state arbitrarily close to its initial state after a finite time. However, in general, H_{\text{tot}} is time-dependent, even though H_{\text{s}} is time-independent.
