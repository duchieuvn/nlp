  window: We now have everything we need to investigate magic at the LHC! Given its previous success in probing entanglement, we can look at top pair production as a potential playground for exploring magic. The Standard Model tells us that the most general configuration of top-antitop spins in pair production at the LHC is a mixed state (i.e. a superposition of so-called pure states ). Such states can be described using the density matrix formalism, and the spin density matrix for a top-antitop pair in partonic channel I has the general form <starteqn> \rho^{I}\sim\tilde{A}^{I}I_{4}+\sum_{i}\left(\tilde{B}_{i}^{I+}\sigma_{i}\otimes I_{2}+\tilde{B}^{I-}I_{2}\otimes\sigma_{i}\right)+\sum_{i,j}\tilde{C}_{ij}\sigma_{i}\otimes\sigma_{j} <endeqn> where I_{n} is an n -dimensional identity matrix. The quantities \{\tilde{A}^{I},\tilde{B}^{I\pm},\tilde{C}_{ij}\} are called Fano coefficients , and are respectively related to the total cross-section, polarisation of the (anti-)top, and spin correlations. Each coefficient depends upon the invariant mass and scattering angle of the top particles, as well as the basis chosen to relate the spin directions (1,2,3) to three directions in physical space.
