  window: 'Thus the grid interval are \Delta x=\Delta y=\Delta z=L/N and \Delta v:=\Delta v_{x}=\Delta v_{y}=\Delta v_{z}=2V/N where N=2^{n} and n\in\mathbb{N} . We define the six-dimensional scalar f(\boldsymbol{x},\boldsymbol{v}) in the phase space \Omega . where, j_{x},j_{y}, and j_{z} represent the index of the grid points in the three-dimensional physical space, and j_{v_{x}},j_{v_{y}}, and j_{v_{z}} represent the indices of the grid points in the three-dimensional velocity space, with each indices taking value from 0 to N-1 . Now, the Vlasov equation for collisionless plasma is represented in a conservative form with the plasma distribution function in phase space as f(\boldsymbol{x},\boldsymbol{v},t) : <starteqn> \frac{\partial f(\boldsymbol{x},\boldsymbol{v},t)}{\partial t}+\boldsymbol{v}\cdot\frac{\partial f(\boldsymbol{x},\boldsymbol{v},t)}{\partial\boldsymbol{x}}+\frac{q}{m}(\boldsymbol{E}(\boldsymbol{x},t)+\boldsymbol{v}\times\boldsymbol{B}(\boldsymbol{x},t))\cdot\frac{\partial f(\boldsymbol{x},\boldsymbol{v},t)}{\partial\boldsymbol{v}}=0 <endeqn> Here, \boldsymbol{E} , \boldsymbol{B} and \boldsymbol{v} are three-dimensional vectors, representing the electric field, magnetic field, and velocity in phase space, respectively. To discretize the spatial derivative terms, we use the central difference method. \boldsymbol{e}:=(1,0,0) is the unit vector in physical space, and similarly for the derivatives with respect to y , z , v_{x} , v_{y} , and v_{z} .'
