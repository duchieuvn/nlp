  equation: '\partialderivative{\rho}{t}=-i[\hat{H}_{n},\rho]+\gamma_{1}\mathcal{D}[\hat{a}]\rho+\gamma_{m}\mathcal{D}[\hat{a}^{m}]\rho\ '
  window: We thus demonstrate the use of bona fide quantum states for memory retrieval. The system under consideration is a single driven-dissipative nonlinear quantum oscillator, where one can exploit its (in principle infinite) number of degrees of freedom, represented by the density matrix of the system, for computational purposes. Following the intuition of Ref. [ 160 ] , a density matrix itself can be seen as a complex quantum network, whose links are built through the set of bipartite correlations within degrees of freedom, and the complexity of such network can facilitate the successful achievement of computational tasks [ 161 ] . The Gorini–Kossakowski–Sudarshan–Lindblad master equation describing the temporal evolution of the oscillator is <starteqn> \partialderivative{\rho}{t}=-i[\hat{H}_{n},\rho]+\gamma_{1}\mathcal{D}[\hat{a}]\rho+\gamma_{m}\mathcal{D}[\hat{a}^{m}]\rho\  <endeqn> where we have the standard linear (single-photon) damping and an engineered nonlinear (multiphoton) damping [ 66 ] with rates \gamma_{1} and \gamma_{m} respectively. Here, \Delta=\omega_{0}-\omega_{s} is the detuning between the natural oscillator frequency and that of the squeezing force, and \eta is the magnitude of the driving. The main ingredient of our approach lies in the nonlinearity which determines the form and phase symmetry of the steady state, changing from coherent states to purely quantum states, depending on the model parameters.
