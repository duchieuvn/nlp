  equation: ds^{2}=(a/\tau)^{2}(d\tau^{2}-dr^{2}-r^{2}d\phi^{2}-dz^{2})
  window: Our main concern here is the influence of the nontrivial topology on the local characteristics of the vacuum state for scalar, spinor and electromagnetic fields. In the region r>0 the line element ( 1 ) is conformally flat. That is seen introducing the conformal time coordinate \tau=-ae^{-t/a} with the range of variation -\infty<\ \tau\ <\ 0 . The line element is written as <starteqn> ds^{2}=(a/\tau)^{2}(d\tau^{2}-dr^{2}-r^{2}d\phi^{2}-dz^{2}) <endeqn> We are interested in the local characteristics of quantum vacuum bilinear in the field operator, such as, the vacuum expectation values (VEVs) of the field squared and EMT. This quantities, as the expectation values of products of the field operators and their derivatives at the same spacetime point, formally diverge and a regularization procedure is required to extract and renormalize the divergences. For a given field, those divergences are completely determined by the local geometry of the background spacetime (see, for example, [ 22 , 23 ] ).
