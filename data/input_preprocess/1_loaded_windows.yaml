  equation: \mathcal{A}\ket{0}_{n+1}=\sqrt{1-a}\ket{\psi_{0}}_{n}\ket{0}+\sqrt{a}\ket{\psi_{1}}_{n}\ket{1}
  window: QAE is the algorithm used to measure this probability, and it is the core subroutine that provides a quadratic improvement for the rate of convergence of QMCI [ 19 ] over CMCI. QAE, originally introduced in [ 6 ] , is the key quantum algorithm used for QMCI. Variations of this algorithm have been proposed over time and we present in this Section a brief and standard presentation of it, for consistency. If we consider an unitary operator \mathcal{A} acting on a register of (n+1) qubits \ket{0}_{n}\ket{0}\equiv\ket{0}_{n+1} such that the following state is prepared <starteqn> \mathcal{A}\ket{0}_{n+1}=\sqrt{1-a}\ket{\psi_{0}}_{n}\ket{0}+\sqrt{a}\ket{\psi_{1}}_{n}\ket{1} <endeqn> where the \ket{\psi_{0}}_{n} and \ket{\psi_{1}}_{n} states are normalised, then QAE can estimate the parameter a=\sin^{2}\theta_{a} , \theta_{a}\in(0,\pi/2] with the convergence of the root mean-squared error (RMSE) of the estimate scaling as \mathcal{O}(1/\mathcal{S}) , where \mathcal{S} is the number of quantum samples i.e., the total number of uses or calls to the oracle \mathcal{A} . This provides a quadratic advantage as compared to classical Monte Carlo sampling – the source of quadratic advantage in QMCI as previously discussed. where \mathbf{1} denotes the identity operator.
