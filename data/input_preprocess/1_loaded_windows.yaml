  equation: \mathbb{E}\left[g(X)\right]=\int_{-\infty}^{\infty}g(x)f_{X}(x)\,dx
  window: The return of a portfolio with a specific allocation \sum_{i=1}^{n}w_{i}X_{i} . \lambda\in\mathbb{R} a Lagrange parameter describing the level of risk aversion of an investor. The task in MCI is to estimate the value of an integral over a measured space \Omega , often a subspace of \mathbb{R}^{n} . Assuming we are interested in integrals over the real line, the expectation of a function g(x) of a continuous random variable X with the PDF f_{X}(x) is defined as <starteqn> \mathbb{E}\left[g(X)\right]=\int_{-\infty}^{\infty}g(x)f_{X}(x)\,dx <endeqn> We refer to g(x) as the “function applied”. On any digital computer, the support of the distribution must be discretised and truncated, and the functions may only take discrete values. 3 3 3 This applies to both the classical and quantum cases, but because resource management is more involved in QC, more careful consideration must be taken, and this is discussed in detail in this work.
