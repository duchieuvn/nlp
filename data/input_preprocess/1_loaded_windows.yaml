  equation: \sum_{i=1}^{n}\sum_{j=1}^{n}\text{Cov}(i,j)\cdot x_{i}x_{j} R_{p}\geq R
  window: 'where r_{i} is the expected return from asset i and x_{i}\in R are weight of asset i in the portfolio, respectively, and n is the total number of assets. where \text{Cov}(i,j) is the covariance between assets i and j . The goal is to find the optimal set of weights \{x_{i}\} , with requirement of \displaystyle\sum_{i}^{n}x_{i}=1 , that either minimize risk for a given return or maximize return for a given risk by creating an efficient frontier of optimal portfolios. The Markowitz portfolio optimization problem to study in this work is defined as follows: <starteqn> \sum_{i=1}^{n}\sum_{j=1}^{n}\text{Cov}(i,j)\cdot x_{i}x_{j} R_{p}\geq R <endeqn> where R is the lower bound on the expected return. where \theta is a scaling parameter for the original objective term (risk), and M is a penalty parameter for the constraint term (return) that penalizes constraint violation relative to the objective function. where \mathbf{H} denotes the objective function, x_{i}\in\{0,1\} is the i-th binary decision variable, a_{i} ’s are the coefficients of the linear terms, and b_{i,j} ’s are the coefficients of the quadratic terms.'
- paper_id: '2410.05932'
  equation_id: '4'
  equation: \mathbf{H} =\theta\cdot\left(\sum_{i=1}^{n}\sum_{j=1}^{n}\text{Cov}(i,j)\cdot x_{i}x_{j}\right) -M\cdot\left(\sum_{i=1}^{n}x_{i}r_{i}-R\right)^{2}
  window: 'where \text{Cov}(i,j) is the covariance between assets i and j . The goal is to find the optimal set of weights \{x_{i}\} , with requirement of \displaystyle\sum_{i}^{n}x_{i}=1 , that either minimize risk for a given return or maximize return for a given risk by creating an efficient frontier of optimal portfolios. where R is the lower bound on the expected return. As constrained problems are relatively more complex than unconstrained problems, in order to solve the above constrained problem using the unconstrained optimization methods, it can be converted into an unconstrained problem by introducing the commonly used quadratic penalty function (the penalty terms are the square of the constraint violations), which can be mathematically represented as follows: <starteqn> \mathbf{H} =\theta\cdot\left(\sum_{i=1}^{n}\sum_{j=1}^{n}\text{Cov}(i,j)\cdot x_{i}x_{j}\right) -M\cdot\left(\sum_{i=1}^{n}x_{i}r_{i}-R\right)^{2} <endeqn> where \theta is a scaling parameter for the original objective term (risk), and M is a penalty parameter for the constraint term (return) that penalizes constraint violation relative to the objective function. where \mathbf{H} denotes the objective function, x_{i}\in\{0,1\} is the i-th binary decision variable, a_{i} ’s are the coefficients of the linear terms, and b_{i,j} ’s are the coefficients of the quadratic terms. where g(x) is the exterior penalty function, M is the penalty coefficient, and the index i refers to each decision variable in the system.'
- paper_id: '2410.05932'
  equation_id: '5'
  equation: \mathbf{H}=\sum_{i=1}^{n}{a_{i}x_{i}}+\sum_{i=1}^{n}\sum_{j=1}^{n}{b_{i,j}x_{i}x_{j}}
  window: 'The goal is to find the optimal set of weights \{x_{i}\} , with requirement of \displaystyle\sum_{i}^{n}x_{i}=1 , that either minimize risk for a given return or maximize return for a given risk by creating an efficient frontier of optimal portfolios. where R is the lower bound on the expected return. where \theta is a scaling parameter for the original objective term (risk), and M is a penalty parameter for the constraint term (return) that penalizes constraint violation relative to the objective function. In the context of quantum-inspired optimization in the QUBO framework, the optimization problem is mapped into a QUBO model as follows: <starteqn> \mathbf{H}=\sum_{i=1}^{n}{a_{i}x_{i}}+\sum_{i=1}^{n}\sum_{j=1}^{n}{b_{i,j}x_{i}x_{j}} <endeqn> where \mathbf{H} denotes the objective function, x_{i}\in\{0,1\} is the i-th binary decision variable, a_{i} ’s are the coefficients of the linear terms, and b_{i,j} ’s are the coefficients of the quadratic terms. where g(x) is the exterior penalty function, M is the penalty coefficient, and the index i refers to each decision variable in the system. where x_{i,k} denotes the k -th binary decision variable associated with asset i , representing a fraction of the proportional investment.'
- paper_id: '2410.05932'
  equation_id: '6'
  equation: \mathbf{H}=\sum_{i=1}^{n}{a_{i}x_{i}}+\sum_{i=1}^{n}\sum_{j=1}^{n}{b_{i,j}x_{i}x_{j}}+M\cdot g(x)
  window: 'where R is the lower bound on the expected return. where \theta is a scaling parameter for the original objective term (risk), and M is a penalty parameter for the constraint term (return) that penalizes constraint violation relative to the objective function. where \mathbf{H} denotes the objective function, x_{i}\in\{0,1\} is the i-th binary decision variable, a_{i} ’s are the coefficients of the linear terms, and b_{i,j} ’s are the coefficients of the quadratic terms. Moreover, many of the constrained optimization problems, as are often found in real-world cases, can be effectively re-formulated as a QUBO model by introducing penalty function into the objective function as follows: <starteqn> \mathbf{H}=\sum_{i=1}^{n}{a_{i}x_{i}}+\sum_{i=1}^{n}\sum_{j=1}^{n}{b_{i,j}x_{i}x_{j}}+M\cdot g(x) <endeqn> where g(x) is the exterior penalty function, M is the penalty coefficient, and the index i refers to each decision variable in the system. where x_{i,k} denotes the k -th binary decision variable associated with asset i , representing a fraction of the proportional investment. The term p_{K}=1/2^{K} represents the granularity level of the binary encoding using K bits, facilitating a granular allocation of investment proportions.'
