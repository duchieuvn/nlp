  window: QMCI, provides a quadratic speed up to this convergence, meaning the RMSE decays as \mathcal{O}(1/\mathcal{S}) . QMCI is a three step process as described in [ 19 ] , and consists of preparing a quantum state that has the values of the probability distribution encoded in its amplitudes, applying the observable function g(\cdot) to each state coherently and then measuring the amplitude of an ancilla qubit, providing an estimate of the integral ( 3.1 ). Mathematically, the starting point is a circuit, P , acting on n qubits, that prepares a quantum state, \ket{p} , encoding the probability distribution f_{X}(x) . The coherent application of the observable function is provided via a circuit R such that <starteqn> R\ket{p}\!\ket{0}=\sum_{x}\sqrt{f_{X}(x)}\ket{x}\left(\sqrt{1-g(x)}\ket{0}+\sqrt{g(x)}\ket{1}\right) <endeqn> In Quantinuum’s QMCI engine [ 19 ] , the circuit R is implemented using the Fourier QMCI approach [ 8 ] . Finally, the probability of measuring 1 on the final qubit is \sum_{x}g(x)f_{X}(x) . Notice that there will be no speedup if we directly measure the ancilla of the state R\ket{p}\!\ket{0} , and the number of samples required will be the same as for classical Monte Carlo methods.
