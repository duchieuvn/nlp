  equation: \equiv\int_{0}^{\infty}dt\leavevmode\nobreak\ G_{v}(t)
  window: For systems with bounded standard deviation of the particle displacements (e.g., vibrating ions in finite temperature crystals), this will lead to general (interaction independent) non-relativistic bounds on single particle speeds [ 5 ] . These are the sort of bounds that we will focus on in this work. To illustrate how the inequalities of the previous Section may carry implications for transport properties, we first discuss the diffusion constant. With v_{i\ell} denoting the \ell -th Cartesian component of the velcoity of the i -th particle, the Green-Kubo relation [ 29 , 30 ] expresses the diffusion constant as an integral of a single particle velocity autocorrelation function [ 31 , 32 , 33 , 34 , 35 , 36 , 37 , 38 ] , <starteqn> \equiv\int_{0}^{\infty}dt\leavevmode\nobreak\ G_{v}(t) <endeqn> with the canonical probability density \rho_{\Lambda}^{\sf canonical}=e^{-\beta H_{\Lambda}}/Z_{\Lambda} (prior to its replacement by its above discussed classical counterpart \rho_{\Lambda}^{\sf classical\leavevmode\nobreak\ canonical} ). Starting from its t=0 value of the equilibrium average G_{v}(0)=\langle v_{i\ell}^{2}\rangle , the velocity autocorrelation function G_{v}(t) remains positive at sufficiently short times 0\leq t<t^{v} . Here, we define t^{v} to be the first zero of G_{v}(t) if any such finite time zero of the autocorrelation function exists (i.e., G_{v}(t=t^{v})=0) and otherwise will set t_{v}=\infty .
- paper_id: '2502.10129'
  equation_id: '6'
  equation: D_{+}\equiv\int_{0}^{t^{v}}dt\leavevmode\nobreak\ G_{v}(t)
  window: In the presence of sufficiently strong disorder, the diffusion constant may vanish, D=0 , as in Anderson localized systems [ 40 , 28 ] . Sign changes of G_{v}(t) also arise in gases under external magnetic fields due to cyclotron motion. The diffusion constant is equal to the asymptotic t\to\infty limit of the derivative of the squared total displacement during time t , i.e., D=(\lim_{t\to\infty}\partial_{t}\langle(\Delta r^{H}_{il}(t))^{2}\rangle)/2 where \Delta r^{H}_{il}(t)\equiv(r^{H}_{il}(t)-r^{H}_{il}(0)) 3 3 3 Since the squared displacement \langle(\Delta r^{H}_{il}(t))^{2}\rangle=\langle(\int_{0}^{t}v^{H}_{il}(t^{% \prime})dt)^{2}\rangle=\int_{0}^{t}dt^{\prime}\int_{0}^{t}dt^{\prime\prime}% \langle v^{H}_{il}(t^{\prime})v^{H}_{il}(t^{\prime\prime})\rangle=2\int_{0}^{t% }dt^{\prime}\int_{0}^{t^{\prime}}dt^{\prime\prime}\langle v^{H}_{il}(t^{\prime% })v^{H}_{il}(t^{\prime\prime})\rangle , it follows that \frac{\partial\langle(\Delta r^{H}_{il}(t))^{2}\rangle}{\partial t}=2\int_{0}^% {t}dt^{\prime\prime}G_{v}(t^{\prime\prime}) . . In what follows, we will not bound the diffusion constant but rather <starteqn> D_{+}\equiv\int_{0}^{t^{v}}dt\leavevmode\nobreak\ G_{v}(t) <endeqn> Clearly, if G_{v}>0 for all finite times t then D_{+} will equal the diffusion constant, D_{+}=D . If single particle displacements can be measured, then D_{+} can, in principle, be experimentally determined for general finite t^{v} . This is so since D_{+}=\partial_{t}(\langle\Delta r^{H}_{il}(t))^{2}\rangle/2 when this derivative is evaluated at t=t^{v} .
