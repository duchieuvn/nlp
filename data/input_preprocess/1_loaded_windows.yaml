  equation: (\mathcal{T}^{s}\circ\mathcal{G}^{t}_{ij})[x]=(\mathcal{G}^{t}_{ij}\circ\mathcal{T}^{s})[x]
  window: for all square-integrable functions \boldsymbol{x},\boldsymbol{x^{\prime}} and all constants \lambda,\lambda^{\prime} at each instant t . In general, a linear system’s map, \mathbfcal{G}^{t} from its n inputs to its m outputs can be decomposed in terms of a collection of maps, \mathbfcal{G}^{t}_{ij} from its j^{\text{th}} input port to its i^{\text{th}} output port (see Lemma 1 ). Given the time-translation operator \mathcal{T}^{s} , defined by, \mathcal{T}^{s}[f(t)]\coloneqq f(t-s) , the classical linear system \{\mathbfcal{G}^{t}\} is said to be linear time-translation-invariant (LTI) if its dynamical map commutes with the time-translation operator, i.e. <starteqn> (\mathcal{T}^{s}\circ\mathcal{G}^{t}_{ij})[x]=(\mathcal{G}^{t}_{ij}\circ\mathcal{T}^{s})[x] <endeqn> for all inputs x , input and output ports, i,j , and times t,s . The assumption of linearity is well-justified for a large class of systems since any system will respond approximately linearly to sufficiently small signals (as long as its dynamical map’s first derivatives with respect to these signals are non-vanishing, which defines the linear operating point). Systems that do not have an internal time reference, i.e. are autonomous in their internal mechanism, satisfy the assumption of time-translation invariance.
