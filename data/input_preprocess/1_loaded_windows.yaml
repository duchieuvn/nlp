  window: The Breit-Wheeler process and its polarization effects have been recently observed at RHIC [ 190 , 191 , 192 , 193 ] . The explicit formulation of the coherent photon distribution is presented below. According to the uncertainty principle, the minimum wavelength of these photons at a given impact parameter is given by the thickness of the contracted field. Then, <starteqn> \Delta t\cdot\Delta E\approx 1\implies\frac{R}{\gamma v}\cdot\omega\approx 1\stackrel{{\scriptstyle v\rightarrow c}}{{\implies}}\omega_{\text{max}}\approx\frac{\gamma}{R} <endeqn> where \Delta t is the passing time in the longitudinal direction, \gamma is the Lorentz factor, and R is the nucleus’s radius, so R/\gamma is approximately the Lorentz contracted length of the field in the beam direction. Thus, the maximum photon energy \omega_{\text{max}} depends on the nucleus type (R) and energy (\gamma) . At RHIC energy scales, the maximum \omega_{\text{max}} for gold nuclei can reach 3 GeV, while at LHC energy scales, \omega_{\text{max}} for lead nuclei can reach 80 GeV, in the lab frame.
