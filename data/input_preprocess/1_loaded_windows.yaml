  window: 'The quantities \{\tilde{A}^{I},\tilde{B}^{I\pm},\tilde{C}_{ij}\} are called Fano coefficients , and are respectively related to the total cross-section, polarisation of the (anti-)top, and spin correlations. Each coefficient depends upon the invariant mass and scattering angle of the top particles, as well as the basis chosen to relate the spin directions (1,2,3) to three directions in physical space. A common choice is the helicity basis [ 14 ] , in which one chooses an orthogonal coordinate system aligned with the top quark direction. Defining the normalised Fano coefficients via <starteqn> B_{i}^{I\pm}=\frac{\tilde{B}^{I\pm}}{\tilde{A}^{I}},\quad C_{ij}^{I}=\frac{\tilde{C}^{I}_{ij}}{\tilde{A}^{I}} <endeqn> Figure 1 shows the magic, as calculated in the SM, for both the q\bar{q} and gg initial states. We see that the magic is concentrated away from extreme kinematic limits (e.g. threshold / high energy), which is not surprising: it is known that the top quark final state becomes separable and / or maximally entangled in these regions. These happen to be stabiliser states, and thus the magic vanishes.'
