  window: '[ 13 ] . The state \ket{(\bullet,\bullet)_{\mathbb{1}}} is obtained when two topological charges \tau fuse to a trivial charge, and the state \ket{(\bullet,\bullet)_{\tau}} when they fuse to the charge \tau . In addition, Fibonacci theory is characterized by the R and F matrices. The R matrix gives the phase shifts associated with the interchange of two anyons and is, in the basis given above, characterized by the 2\times 2 diagonal matrix <starteqn> R=\operatorname{diag}(R^{\tau\tau}_{1},R^{\tau\tau}_{\tau})=\begin{pmatrix}e^{-\frac{4\pi i}{5}}&0\ 0&e^{\frac{3\pi i}{5}}\end{pmatrix} <endeqn> If these anyons fuse to the trivial charge \mathbb{1} , F_{\mathbb{1}}^{\tau\tau\tau} is trivially unity. where \phi=(\sqrt{5}+1)/2 is the golden ratio. The seminal works on topological quantum compilation [ 13 , 14 , 15 ] primarily use a three-anyon encoding of a logical qubit to realize both single-qubit and two-qubit operations via braiding or weaving.'
