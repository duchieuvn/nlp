  equation_id: '1'
  equation: \min_{\mathbf{w},b}\frac{1}{2}||\mathbf{w}||^{2}
  window: 'Rather than focusing solely on matrix-inversion routines, these methods evaluate inner products of quantum states (i.e., kernel functions) that would be prohibitively expensive to compute classically. By embedding data into high-dimensional quantum feature spaces, one can construct decision boundaries that may be unreachable with purely classical algorithms. Indeed, Ref. [ 31 ] demonstrates an end-to-end quantum speedup for a suitably constructed classification problem, providing concrete evidence that quantum kernels can yield practical gains in machine learning tasks. Classical SVMs aim to find a hyperplane that maximizes the margin between two classes, typically formulated in its primal form as: <starteqn> \min_{\mathbf{w},b}\frac{1}{2}||\mathbf{w}||^{2} <endeqn> where \mathbf{w} is the normal vector to the hyperplane, b is the bias, \mathbf{x}_{j} are feature vectors, and y_{j} are the class labels. In quantum extensions of this method, the data are mapped into a higher-dimensional Hilbert space via a quantum kernel, enabling efficient non-linear classification that would otherwise be computationally prohibitive on classical hardware. Early QSVM formulations relied on quantum matrix-inversion routines, such as the HHL algorithm [ 32 ] , to mitigate the computational bottleneck inherent to large-scale SVMs.'
- paper_id: '2405.02630'
