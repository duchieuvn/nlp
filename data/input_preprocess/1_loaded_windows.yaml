  window: 'A summary and discussion are presented in Sec. VI . The methods for calculating the quantum evolution dynamics, bipartite von Neumann entanglement entropy, and an error analysis are given in Appendix A and the transition from Wannier-Stark localization to Floquet scar phase is described in Appendix B . The detailed introductions for the Floquet perturbation theory are in Appendix C , and the robust period-doubling phenomenon is shown in Appendix D . The 1D tilted Fermi-Hubbard chain under periodic driving is given by Hamiltonian [ 40 , 17 ] <starteqn> +U(t)\sum_{j}\hat{n}_{j,\uparrow}\hat{n}_{j,\downarrow} <endeqn> where \hat{c}_{j,\sigma}^{{\dagger}} ( \hat{c}_{j,\sigma} ) is the fermionic creation (annihilation) operator on site j with the spin index \sigma , \hat{n}_{j,\sigma}=\hat{c}_{j,\sigma}^{{\dagger}}\hat{c}_{j,\sigma} is the density operator, J and \Delta are the nearest-neighbor hopping amplitude and spin-independent tilted potential, respectively. For simplicity, the on-site Coulomb interaction is defined with a square-wave driving function: U(t)=U_{0}+U_{m}\ {\rm sgn}\left(\cos(\omega t)\right) , where U_{0} is the static detuning, U_{m} is the modulation amplitude, and \omega is the driving frequency. The linear static tilt \Delta can be implemented using a magnetic field gradient and the time-periodic signal U(t) can be modulated via a Feshbach resonance [ 43 , 44 , 45 ] .'
