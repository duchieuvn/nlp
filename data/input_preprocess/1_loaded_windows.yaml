  equation: '[\hat{t},\hat{H}_{\mathcal{C}}]=i\hat{1}_{\mathcal{C}}'
  window: where \hat{H}_{\mathcal{R}} is the free Hamiltonian of the rest of the universe, \hat{H}_{\mathcal{C}} is that of the clock, and \hat{1}_{\mathcal{C}} and \hat{1}_{\mathcal{R}} are the unit observables of the clock and the rest of the universe, respectively. This explains dynamical evolution because, although the composite system is stationary, these subsystems will ‘evolve’ relative to each other, as we will see shortly. The third and final assumption is that the clock is an ideal one so that it has an observable \hat{t} that is conjugate to its Hamiltonian, i.e. <starteqn> [\hat{t},\hat{H}_{\mathcal{C}}]=i\hat{1}_{\mathcal{C}} <endeqn> We shall call \hat{t} the clock’s ‘time observable’ since its value represents the time as indicated by the clock. For instance, an eigenstate {\left|t\right>} of \hat{t} , which has eigenvalue t , will have the unequivocal physical meaning ‘according to the clock, it is time t ’ or as a shorthand ‘it is clock time t ’. We use the term clock time to distinguish it from time as indicated by the time parameter \lambda , as the two are markedly different notions of time.
