  window: Together with the closedness in the \tau direction, the desired saddle manifold should have a closed topology similar to the original Euclidean dS space. for both zero and nonzero \Lambda_{0} . Here d\Omega_{D-1}^{2} is the induced metric on a D-2 dimensional sphere. Two metric components g_{\tau\tau}=h and g_{rr}=1/f are some radial dependent functions that solve the field equations, with h chosen to satisfy the boundary condition <starteqn> \frac{d\sqrt{h}}{dl}\bigg{|}_{l=0}=2\pi T=\frac{2\pi}{\beta} <endeqn> where l is the radial proper distance from the Euclidean horizon. When such a stationary point dominates, the partition function can be approximated by the minimum saddle action I^{\mathrm{min}}_{\mathrm{E}} , thus yielding Z\approx\exp{(-I^{\mathrm{min}}_{\mathrm{E}})} due to the vanishing of \hat{\mathcal{C}} for any saddles. The logarithm of Z then turns out to be the Bekenstein-Hawking entropy, i.e., one quarter of the horizon area of the boundary.
