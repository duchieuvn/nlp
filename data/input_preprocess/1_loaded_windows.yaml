  equation: ds^{2}=dt^{2}-e^{2t/a}(dr^{2}+r^{2}d\phi^{2}+dz^{2})
  window: The fermion condensate and the VEV of the corresponding EMT are studied. The VEVs of the electric and magnetic field squared and EMT for the electromagnetic field are discussed in section 4 . In this section we describe the background geometry and consider the polarization of the scalar vacuum around CS. We consider a spacetime geometry described by the line element <starteqn> ds^{2}=dt^{2}-e^{2t/a}(dr^{2}+r^{2}d\phi^{2}+dz^{2}) <endeqn> with spatial cylindrical coordinates (r,\phi,z) varying in the range 0\leq r<\infty , 0\leq\phi\leq\phi_{0} , and -\infty<z<+\infty . For the variation range of the synchronous time coordinate one has -\infty<t<+\infty . In the special case \phi_{0}=2\pi , ( 1 ) corresponds to the dS spacetime covered by inflationary coordinates.
