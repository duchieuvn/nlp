  window: As shown in this figure, the non-linearity is not only present but highly tunable by changing the input encoding of the function \phi_{k} , which was also illustrated in Ref. [ 129 ] . This allows a high reconfigurability of the reservoir for different tasks, and comes at a very low experimental cost, as the network is kept fixed at all times. Going beyond ideal conditions, noise is to be considered in the measured quantities [ 152 , 129 ] . Doing so, at every time step, the measured readout values can be written as <starteqn> \mathbf{O}_{\text{meas}}^{(k)}=\mathbf{O}_{\text{ideal}}^{(k)}+\mathbf{u}\left(0,s_{\text{noise}}^{2}\right)\  <endeqn> where \mathbf{O}_{\text{ideal}}^{(k)} is a vector containing the expected values of the chosen observables in ideal, noiseless conditions, while \mathbf{O}_{\text{meas}}^{(k)} contains the measured observables. The vector \mathbf{u}(0,s_{\text{noise}}^{2}) resembles the readout noise, which we model as additive Gaussian fluctuations with zero mean and variance equal to s_{\text{noise}}^{2} added to the quadrature measurements. In our case, the variance of the vacuum noise is assumed to be s_{\text{vac}}^{2}=0.5 , so that we can express the additive noise intensity relative to the vacuum fluctuations.
