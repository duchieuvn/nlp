  window: To model the system we will follow a circuit model approach, similarly to the Supplementary material of [ 41 ] and to [ 60 , 61 ] . Superconducting transmission lines provide an experimental system where dynamical degrees of freedom of the electromagnetic field can be simplified into a one-dimensional real scalar quantum field theory. Although it is well-known in the literature of superconducting quantum devices, for convenience and notation setting purposes, we include here a brief derivation of the Hamiltonian of the transmission line from its lumped circuit model depicted in Figure 1 . The Hamiltonian of this lumped circuit model is <starteqn> H_{\textsc{tl},\Delta x}=\frac{1}{2}\sum_{i}\frac{(\Phi_{i+1}-\Phi_{i})^{2}}{\ell_{0}\Delta x}+\frac{q_{i}^{2}}{c_{0}\Delta x} <endeqn> where \ell_{0} and c_{0} respectively are the inductance and capacitance per unit length. where V_{i} and I_{i} respectively are the voltage and intensity from the node i to ground. After quantization, \hat{H}_{\textsc{tl}} can be recognized as the Hamiltonian of a 1D real massless scalar quantum field.
