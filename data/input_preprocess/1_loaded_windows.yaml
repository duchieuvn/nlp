  equation: '|\psi\rangle=\alpha|0\rangle+\beta|1\rangle,\quad|\alpha|^{2}+|\beta|^{2}=1'
  window: Might these also be useful for high energy physics? In this proceeding, we examine one such property – magic – and argue that the LHC indeed offers an interesting situation for studying it. To introduce magic, let us first briefly review aspects of quantum computing. In quantum computers, classical bits (with values \{0,1\} ) are replaced with qubits , namely normalised quantum states <starteqn> |\psi\rangle=\alpha|0\rangle+\beta|1\rangle,\quad|\alpha|^{2}+|\beta|^{2}=1 <endeqn> where |0\rangle and |1\rangle are orthogonal basis states, and \alpha , \beta complex coefficients. The canonical example of a single qubit system is a spin-1/2 particle, in which case |0\rangle and |1\rangle may represent the two linearly independent spin states. Multi-qubit systems can then be described using a basis comprised of tensor products of single-qubit states.
- paper_id: '2412.07479'
  equation_id: '2'
  equation: '{\cal P}_{n}=P_{1}\otimes P_{2}\otimes\ldots\otimes P_{N},\quad P_{a}\in\{\sigma_{1}^{(a)},\sigma_{2}^{(a)},\sigma_{3}^{(a)},I^{(a)}\}'
  window: '[ 11 ] in the context of this proceeding. Quantum computers are expected to vastly outperform their classical counterparts, which is naïvely due to the two quantum properties of superposition and entanglement . However, it turns out that this is not quite true, and to see why, we need the concept of a stabiliser state . These are multiqubit states that give a simple spectrum for a restricted set of operators known as Pauli strings : <starteqn> {\cal P}_{n}=P_{1}\otimes P_{2}\otimes\ldots\otimes P_{N},\quad P_{a}\in\{\sigma_{1}^{(a)},\sigma_{2}^{(a)},\sigma_{3}^{(a)},I^{(a)}\} <endeqn> In words: a Pauli string acting on n qubits operates on the a^{\rm th} qubit with a Pauli matrix, or an identity matrix. There are then 4^{n} such strings for n qubits. Stabiliser states are such that the set of expectation values of all Pauli strings have 2^{n} values which are \pm 1 , and the rest zero.'
- paper_id: '2412.07479'
  equation_id: '3'
  equation: M_{q}=\frac{1}{1-q}\log_{2}(\zeta_{q}),\quad\zeta_{q}\equiv\sum_{P\in{\cal P}_{n}}\frac{\langle\psi|P|\psi\rangle^{2q}}{2^{n}}
  window: 'Thus, something other than entanglement is needed for efficient quantum computing. The “something else” has been called magic in the literature, and from the above comments basically measures “non-stabiliserness” of a quantum state. Different definitions of magic exist in the literature, and we will here use the Stabiliser Rényi Entropies of ref. [ 13 ] : <starteqn> M_{q}=\frac{1}{1-q}\log_{2}(\zeta_{q}),\quad\zeta_{q}\equiv\sum_{P\in{\cal P}_{n}}\frac{\langle\psi|P|\psi\rangle^{2q}}{2^{n}} <endeqn> In these formulae, q\geq 2 is an integer, and \zeta_{q} represents a weighted sum over the Pauli spectrum values raised to a power. We can think of the set of values \{M_{q}\} as providing moments of the Pauli spectrum, and this definition turns out to have the following desirable properties: (i) the magic is additive when combining quantum systems; (ii) it vanishes for stabiliser states. In what follows, we will focus on q=2 (i.e. the Second Stabiliser Rényi Entropy ), given this is already sufficient to quantify non-zero magic.'
