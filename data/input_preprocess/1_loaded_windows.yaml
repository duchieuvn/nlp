  equation: R_{p}=\sum_{i=1}^{n}x_{i}r_{i}
  window: 'Section IV discusses the effects of the proposed methods on the performance of portfolio optimization. Section V concludes the paper with future directions. In this study of Markowitz portfolio optimization, an investor aims to distribute investment among n assets to maximize their portfolio returns while managing the portfolio risk. Let R_{p} denote the expected return from the entire portfolio which can be defined as: <starteqn> R_{p}=\sum_{i=1}^{n}x_{i}r_{i} <endeqn> where r_{i} is the expected return from asset i and x_{i}\in R are weight of asset i in the portfolio, respectively, and n is the total number of assets. where \text{Cov}(i,j) is the covariance between assets i and j . The goal is to find the optimal set of weights \{x_{i}\} , with requirement of \displaystyle\sum_{i}^{n}x_{i}=1 , that either minimize risk for a given return or maximize return for a given risk by creating an efficient frontier of optimal portfolios.'
- paper_id: '2410.05932'
