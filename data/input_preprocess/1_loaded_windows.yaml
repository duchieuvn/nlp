  equation: \text{fidelity}(m)=\frac{A}{1+e^{-k\left(m-x_{0}\right)}}+\text{off}
  window: 'Figure 5 shows slices of the circuit simulation taken after sequential steps through the circuit of 200 gates. Just like in Figure 4 , we can see that regardless of circuit depth, noise dominates at small number of codewords due to the error introduced by truncating to so few codewords, but as the number of codewords increases, the results become less noisy. From this relationship between the number of codewords used for vector quantization and the simulation fidelity, we can derive an upper-bound estimate of the number of codewords, 2^{m} , needed to achieve a desired fidelity at a given depth. First, we empiricaly fit the following logistic function to the data in Figure 5 for each time step in the circuit simulation: <starteqn> \text{fidelity}(m)=\frac{A}{1+e^{-k\left(m-x_{0}\right)}}+\text{off} <endeqn> Figure 6 shows how the parameters of this fit change with the depth of the circuit being simulated. For three out of the four parameters, their asymptotic behavior with respect to the circuit depth is constant with some high-frequency noise. However, x_{0} grows logarithmically with the circuit depth while sharing the same high-frequency noise as the other three parameters.'
