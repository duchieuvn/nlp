  window: 'During the rotation in phase space, the initial momentum distribution \delta_{\text{p}}(0) is converted into a real space distribution \delta_{\text{x}}(T_{1}/4)=\delta_{\text{p}}(0)/m\omega_{1} at t=T_{1}/4 . Through Heisenberg’s uncertainty the smallest structure sizes in the initial system \sigma_{\text{x}} set a lower limit for the momentum distribution, \delta_{\text{p}}(0)\geq\hbar/2\sigma_{\text{x}} . Therefore, the constraint through ( 4 ) at T_{1}/4 defines the diffraction limit of the matterwave magnifier. The diffraction limit depends on the waist of the Gaussian potential, and on the available laser power [ 19 , 20 ] : <starteqn> \sigma_{\text{x}}\gg\frac{\sqrt{\pi}\hbar W}{4\sqrt{2|\tilde{\alpha}|Pm}} <endeqn> Note that substantial laser power is required to achieve a diffraction limit much smaller than the field-of-view. For the second rotation in phase space, the trap frequency \omega_{2} is selected such that the magnified smallest structural feature, M\cdot\sigma_{x} , surpasses the optical resolution \delta_{\mathrm{psf}} of the imaging system. Simultaneously, the magnified wave function must remain within the field of view of the optical imaging setup.'
