  window: From the detection events, we extract the respective count probabilities for illuminated ( P_{I} ) and non-illuminated gates ( P_{NI} ). Dark count probability ( P_{D} ) was measured separately by turning the laser off. where R=125 is the ratio of the detector gating frequency (1.25 GHz) to the laser illumination frequency (10 MHz). Excluding dark and afterpulse counts, the net photon detection efficiency is given by <starteqn> \eta_{net}=\frac{1}{\mu}\ln\frac{1-P_{NI}}{1-P_{I}} <endeqn> where \mu is the average incident photon number per illumination pulse. By adjusting the amplitude of the 1.25 GHz clock input, we are able to vary the APD excess voltage and hence the detection efficiency. Figure 4 (a) plots the dark count and afterpulse probabilities as a function of net photon detection efficiency.
- paper_id: '2408.00252'
