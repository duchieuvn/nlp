  window: Such spontaneous photon current is intriguing because it challenges our naive understanding of what dissipation can really do. Our results indicate that photon loss applied to a cavity can actually assist the cavity to first acquire photons from vacuum and then pass them to other cavities with ultimately giving them back to its surrounding. The system we consider here consists of a collection of N identical two-level quantum emitters with resonant frequency \Omega , which interact with the bosonic modes confined with multiple tunneling-coupled cavities, with Fig. 1 showcasing an example with three cavities in a triangular configuration. Assuming a_{n}^{{\dagger}} and a_{n} are the creation and annihilation operators of the n th cavity mode respectively, the tight-binding Hamiltonian of such spin-cavity system is given by <starteqn> +\hbar\Omega S_{z}+\sum_{n=1}^{N_{c}}\frac{2\hbar g}{\sqrt{N}}\left(a_{n}+a_{n}^{{\dagger}}\right)S_{x}\text{,} <endeqn> where \omega_{n} is the resonance frequency of photon mode in the n th cavity with a periodic boundary condition a_{N_{c}+1}=a_{1} ( N_{c}=3 as an example to elaborate on our theoretical calculations below), and J is the photon hopping strength. The collective spin operators S_{\alpha}=\sum_{j=1}^{N}\sigma_{\alpha}^{j}/2 ( \alpha=x,y,z ) are defined by using the individual Pauli spin operators \sigma_{\alpha}^{j} , where j denotes the j th two-level emitter. At the n th cavity site, the local spin-cavity coupling strength is characterized by g .
