  equation_id: '1'
  equation: \mathbb{1}\times\tau=\mathbb{1}+\tau
  window: Braiding of anyons thus implements quantum computing operations on n quantum bits or qubits, encoded in the ground-state manifold with the Hilbert space dimension d\geq 2^{n} . An important attribute of anyon theory from the point of view of quantum computation is universality, that is, whether braiding permits universal quantum computing operations from the unitary group U(2^{n}) . Fibonacci anyons, which are at the center of our interest, are known to be universal for quantum computation [ 12 ] . The Fibonacci theory [ 8 ] consists of two topological charges, or q -spins, the trivial charge \mathbb{1} and the Fibonacci anyon charge \tau , which satisfy the single non-trivial fusion rule <starteqn> \mathbb{1}\times\tau=\mathbb{1}+\tau <endeqn> which makes this theory particularly simple. The fusion rules allow us to define an orthogonal basis for the system of two Fibonacci anyons using a convenient notation introduced by Bonesteel et al. [ 13 ] .
