  equation: \epsilon_{E}(\widehat{g(X)})=\mathinner{\!\left\lvert\mathbb{E}\left[g(X)\right]-\mathbb{E}[\widehat{g(X)}]_{S}\right\rvert}
  window: This means that both classical and quantum digital computers can only approximately prepare the distribution and compute the function applied. Therefore, MCI on a digital computer estimates \mathbb{E}\left[g(X)\right]_{S} , where the subscript S means that the expectation of the function applied is computed for a digitised distribution, and the difference between \mathbb{E}\left[g(X)\right] and \mathbb{E}\left[g(X)\right]_{S} is the systematic error introduced by the digitisation, which is discussed in detail in this work. Classically, we sample the random variable \mathcal{S} times, calculate the function g(\cdot) for each sample, and obtain an estimate of the integral by averaging these values. Denoting the estimated value with \widehat{\mathbb{E}[g(X)]_{S}} , we then define the estimation error (which includes statistical and systematic errors) as <starteqn> \epsilon_{E}(\widehat{g(X)})=\mathinner{\!\left\lvert\mathbb{E}\left[g(X)\right]-\mathbb{E}[\widehat{g(X)}]_{S}\right\rvert} <endeqn> Classically, the central limit theorem can be invoked to obtain the asymptotic decay of the RMSE as \mathcal{O}(1/\sqrt{\mathcal{S}}) , where \mathcal{S} is the number of samples. The quantum counterpart of MCI, i.e. QMCI, provides a quadratic speed up to this convergence, meaning the RMSE decays as \mathcal{O}(1/\mathcal{S}) .
