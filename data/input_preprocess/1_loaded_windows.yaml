  equation: \begin{bmatrix}\hat{x}(t)\ \hat{p}(t)\end{bmatrix}=\begin{bmatrix}\cos{\omega t}&\frac{1}{m\omega}\sin{\omega t}\ -m\omega\sin{\omega t}&\cos{\omega t}\end{bmatrix}\begin{bmatrix}\hat{x}(0)\ \hat{p}(0)\end{bmatrix}
  window: We characterize the performance of the matterwave microscope using the non-interacting harmonic oscillator ground state as a test target and demonstrate its capabilities by imaging a strongly interacting system with single atom and spin resolution in real space. Matterwave magnification is achieved by two subsequent rotations of the wave function in phase space [ 17 ] , which are realized by a time evolution in two harmonic potentials, each described by U_{1,2}=1/2m\omega_{1,2}^{2}x^{2} . Here, m is the mass of the particles, \omega_{1,2} is the angular frequency of the respective harmonic oscillator and x is the position in the two-dimensional plane to be imaged. In the Heisenberg picture, the time evolution of the single particle, real and momentum space operators – \hat{x} and \hat{p} , respectively – in a harmonic potential are given by <starteqn> \begin{bmatrix}\hat{x}(t)\ \hat{p}(t)\end{bmatrix}=\begin{bmatrix}\cos{\omega t}&\frac{1}{m\omega}\sin{\omega t}\ -m\omega\sin{\omega t}&\cos{\omega t}\end{bmatrix}\begin{bmatrix}\hat{x}(0)\ \hat{p}(0)\end{bmatrix} <endeqn> These equations also apply to the many body case if the system is non-interacting. At t=\frac{T}{4}=\frac{1}{4}\frac{2\pi}{\omega} the rotation is equivalent to a Fourier transform scaled by m\omega , which maps \hat{x} to \hat{p} , and vice versa. Therefore, two subsequent rotations in traps with frequencies \omega_{1} and \omega_{2} lead to a magnification of the matterwave by a factor of M=\frac{\omega_{1}}{\omega_{2}} .
