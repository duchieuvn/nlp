  window: Further, modes F_{1} and F_{2} are initialized to Fock states |m_{1}\rangle and |m_{2}\rangle . Now, mode A_{1} ( A_{2} ) is mixed with mode F_{1} ( F_{2} ), using a beam splitter of transmissivity T_{1} ( T_{2} ) respectively. Consequently, the four modes get entangled. The four-mode entangled state is represented by <starteqn> \chi_{F_{1}^{\prime}A_{1}^{\prime}A_{2}^{\prime}F_{2}^{\prime}}(\Lambda)=\chi_{F_{1}A_{1}A_{2}F_{2}}(B(T_{1},T_{2})^{-1}\Lambda) <endeqn> where B(T_{1},T_{2})=B_{A_{1}F_{1}}(T_{1})\,{\oplus}\,B_{A_{2}F_{2}}(T_{2}) denotes the collective action of the two beam splitters with B_{ij}(T) being the beam splitter operation given in <other_eqref> of the Appendix A . We employ photon number resolving detectors on the auxiliary modes F_{1}^{{}^{\prime}} and F_{2}^{{}^{\prime}} . When the detector in the output mode detects |n_{1}\rangle and |n_{2}\rangle photons, it heralds successful implementation of non-Gaussian operation on both the modes.
