  window: 'Evidently, the expectation value of any observable at any time \lambda is equivalent to its expectation value at \lambda=0 , so the time parameter might as well not be there at all. How, then, can it be that there appears to be evolution and change in the real universe? To explain this, Page & Wootters assumed that the universe can be divided into two non-interacting subsystems: a clock, \mathcal{C} , with Hilbert space \mathscr{H}_{\mathcal{C}} , and the rest of the universe, \mathcal{R} , with Hilbert space \mathscr{H}_{\mathcal{R}} , where the latter system might in turn consist of further subsystems. \mathcal{C} and \mathcal{R} jointly constitute the entire universe so that the Hilbert space of the universe is \mathscr{H}_{U}=\mathscr{H}_{\mathcal{C}}\otimes\mathscr{H}_{\mathcal{R}} . Because we assume that \mathcal{C} and \mathcal{R} are non-interacting, the Hamiltonian of this model must be a sum of the free Hamiltonians of \mathcal{C} and \mathcal{R} so that <starteqn> \hat{\mathcal{H}}=\hat{H}_{\mathcal{R}}\otimes\hat{1}_{\mathcal{C}}+\hat{1}_{\mathcal{R}}\otimes\hat{H}_{\mathcal{C}} <endeqn> where \hat{H}_{\mathcal{R}} is the free Hamiltonian of the rest of the universe, \hat{H}_{\mathcal{C}} is that of the clock, and \hat{1}_{\mathcal{C}} and \hat{1}_{\mathcal{R}} are the unit observables of the clock and the rest of the universe, respectively. This explains dynamical evolution because, although the composite system is stationary, these subsystems will ‘evolve’ relative to each other, as we will see shortly. The third and final assumption is that the clock is an ideal one so that it has an observable \hat{t} that is conjugate to its Hamiltonian, i.e.'
