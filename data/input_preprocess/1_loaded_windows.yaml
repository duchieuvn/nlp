  window: The method to get H_{\text{tot}}(t) Wu et al. ( 2019 ) and its proof is pretty complex, but for our purpose, we will focus on M(t) , because we find that the time-dependence of H_{\text{tot}} can come solely from M(t) , i.e., if M(t) can be time-independent, so does H_{\text{tot}}(t) . M(0) is chosen to ensure that M(t)-I keeps positive for all t . It turns out that we can choose M(0) as the linear combination of \ket{\phi_{n}}\bra{\phi_{n}} with appropriate coefficients (with M^{\prime}(0) being a positive operator, of which all the eigenvalues are larger than 1, M(0) = M^{\prime}(0)/\mu for some \mu>0 is what we need), then <starteqn> M_{n}(t) =e^{-\text{i}H_{\text{s}}^{\dagger}t}\ket{\phi_{n}}\bra{\phi_{n}}e^{\text{i}H_{\text{s}}t} =e^{-\text{i}(\kappa_{n}-\kappa_{n}^{\ast})t}\ket{\phi_{n}}\bra{\phi_{n}} <endeqn> where \ast means complex conjugate. So, if the spectrum of H_{\text{s}}^{\dagger} is real, \kappa_{n}-\kappa_{n}^{\ast}=0 and M(t) is time-independent. And thus H_{\text{tot}}(t) can be time-independent, which indicates that quantum recurrence will happen in the NH system governed by H_{\text{s}} .
