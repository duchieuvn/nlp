  window: Thus when the dimension of the configuration space N_{c} is \dim(N_{c})\geq 2 one observes, in general, the coexistence of ordered and chaotic trajectories [ 11 , 12 , 13 ] . In fact, it has already been shown that there are cases where a classical system is integrable and the corresponding Bohmian quantum system is chaotic and there are cases where a chaotic classical system has an ordered Bohmian quantum counterpart. Most works in Bohmian Mechanics refer to quantum trajectories corresponding to a simple integrable classical system of two or more dimensions, namely a sum of non interacting quantum harmonic oscillators. Considering a 2d system we have <starteqn> V_{0}=\frac{1}{2}\omega_{x}^{2}x^{2}+\frac{1}{2}\omega_{y}^{2}y^{2} <endeqn> where \Phi_{m,n}^{(s)}=H_{m}(\bar{x})H_{n}(\bar{y}) and H are Hermite polynomials of degree m in \bar{x}=\sqrt{\frac{m_{x}\omega_{x}}{\hbar}}x and H_{n} of degree n in \bar{y}=\sqrt{\frac{m_{y}\omega_{y}}{\hbar}}y . The indices m,n (quantum numbers) can take any integer value in [0,\infty) . which does not have any chaos.
