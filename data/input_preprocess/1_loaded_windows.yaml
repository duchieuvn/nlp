  equation: \sigma_{p}^{2}=\sum_{i=1}^{n}\sum_{j=1}^{n}\text{Cov}(i,j)\cdot x_{i}x_{j}
  window: 'Section V concludes the paper with future directions. In this study of Markowitz portfolio optimization, an investor aims to distribute investment among n assets to maximize their portfolio returns while managing the portfolio risk. where r_{i} is the expected return from asset i and x_{i}\in R are weight of asset i in the portfolio, respectively, and n is the total number of assets. The risk, measured as portfolio variance \sigma_{p}^{2} , is given by: <starteqn> \sigma_{p}^{2}=\sum_{i=1}^{n}\sum_{j=1}^{n}\text{Cov}(i,j)\cdot x_{i}x_{j} <endeqn> where \text{Cov}(i,j) is the covariance between assets i and j . The goal is to find the optimal set of weights \{x_{i}\} , with requirement of \displaystyle\sum_{i}^{n}x_{i}=1 , that either minimize risk for a given return or maximize return for a given risk by creating an efficient frontier of optimal portfolios. where R is the lower bound on the expected return.'
