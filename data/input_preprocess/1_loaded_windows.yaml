  equation: \hat{H}=\hat{H}_{\text{dis}}+\hat{H}_{\text{int}}
  window: 'The combination of strong spin-spin interactions, weak coupling to the external bath, cavity-enhanced fast readout, and effective spin density control positions our system as a promising platform for studying many-body spin dynamics. Notably, our spin system features the highest ratio of interaction strength to transition inhomogeneity among solid-state electronic spin systems, underscoring its significance in probing many-body dynamics where collective interaction effects are minimally hindered by on-site disorder (Fig. 1 f). The very first step before we utilize our REI spin system as a many-body testbed is to quantitatively characterize the interaction and disorder strengths in the system. To this end, we describe the dynamics of our interacting spin system using the following Hamiltonian (in a rotating frame), \hat{H} , defined within the qubit manifold \{\ket{0},\ket{1}\} : <starteqn> \hat{H}=\hat{H}_{\text{dis}}+\hat{H}_{\text{int}} <endeqn> where \hat{H}_{\text{dis}}=\sum_{i}^{N}\Delta_{i}\hat{S}_{z}^{i} is the on-site disorder Hamiltonian with spin detuning \Delta_{i} for ion i , and \hat{H}_{\text{int}}=\sum_{ij,\;i>j}^{N}J_{ij}(\hat{S}_{x}^{i}\hat{S}_{x}^{j}+% \hat{S}_{y}^{i}\hat{S}_{y}^{j})=\sum_{ij,\;i>j}^{N}\frac{J_{ij}}{2}(\hat{S}_{+% }^{i}\hat{S}_{-}^{j}+\hat{S}_{-}^{i}\hat{S}_{+}^{j}) is the long-range, dipolar spin-exchange Hamiltonian with position- and orientation-dependent pairwise interaction strength J_{ij} between two ions i and j (see Supplementary Information for details). Here, \hat{S}_{\mu}^{i} is the spin-1/2 operator of ion i along the \mu -axis ( \mu=x,y,z ), and \hat{S}_{\pm}^{i}=\hat{S}_{x}^{i}\pm i\hat{S}_{y}^{i} are the creation and annihilation operators for spin excitation of ion i . We define the strength of on-site disorder, W , as the full width at half maximum of the probability distribution function of \Delta_{i} .'
- paper_id: '2408.00252'
  equation_id: '2'
  equation: \hat{H}_{\text{eff}} =w_{\text{Heis}}\hat{H}_{\text{Heis}}+\sum_{\mu=x,y,z}\left(w_{\text{on-site}}^{\mu}\hat{H}_{\text{on-site}}^{\mu}+w_{\text{Ising}}^{\mu}\hat{H}_{\text{Ising}}^{\mu}\right)
  window: 'Specifically, we prepare an initial state in a globally polarized state along the y -axis, let the spin system evolve under a control pulse sequence over an interrogation time T , and apply a \pi/2 pulse with a variable rotation axis \theta at the end of the sequence to measure the mean coherence of all individual spins. Through this experiment, we can probe the decoherence dynamics of a spin ensemble as a function of T , defined as the average spin polarization along the y -axis, P(T)=\frac{1}{N}\bra{\Psi(T)}\hat{S}^{\text{tot}}_{y}\ket{\Psi(T)} . Here, \hat{S}^{\text{tot}}_{y}=\sum_{i}^{N}\hat{S}_{y}^{i} is the total spin operator along the y -axis with N being the total number of spins, and \ket{\Psi(T)}=e^{-i\hat{H}_{\text{eff}}T}\ket{\Psi(0)} is the quantum state at time T obtained through time evolution under the dynamically-engineered effective Hamiltonian \hat{H}_{\text{eff}} . Crucially, with dynamic Hamiltonian engineering of the original dipolar XY Hamiltonian, we can realize a wide class of different effective Hamiltonians, \hat{H}_{\text{eff}} , parameterized as <starteqn> \hat{H}_{\text{eff}} =w_{\text{Heis}}\hat{H}_{\text{Heis}}+\sum_{\mu=x,y,z}\left(w_{\text{on-site}}^{\mu}\hat{H}_{\text{on-site}}^{\mu}+w_{\text{Ising}}^{\mu}\hat{H}_{\text{Ising}}^{\mu}\right) <endeqn> Here, w_{\text{Heis}} , w_{\text{on-site}} , and w_{\text{Ising}} are relative weights between the different Hamiltonians: the Heisenberg Hamiltonian \hat{H}_{\text{Heis}}=\sum_{ij,\;i>j}^{N}J_{ij}\vec{S}^{i} \bm{\cdot} \vec{S}^{j} , the on-site Hamiltonian \hat{H}_{\text{on-site}}^{\mu}=\sum_{i}^{N}h_{\mu}^{i}\hat{S}_{\mu}^{i} , and the Ising Hamiltonian \hat{H}_{\text{Ising}}^{\mu}=\sum_{ij,\;i>j}^{N}J_{ij}\hat{S}_{\mu}^{i}\hat{S}% _{\mu}^{j} , where \vec{S}^{i}=(\hat{S}_{x}^{i},\hat{S}_{y}^{i},\hat{S}_{z}^{i}) is a vectorized spin operator, and \vec{h}^{i}=(h_{x}^{i},h_{y}^{i},h_{z}^{i}) is an effective on-site field for ion i . Note that the Heisenberg Hamiltonian \hat{H}_{\text{Heis}} is isotropic, whereas the other two Hamiltonians exhibit directionality along the \mu -axis. As depicted in Figs. 4 b and 4 c, we implement and compare four different effective Hamiltonians using Ramsey, spin-echo, Waugh-Huber-Haberlen (WAHUHA)-echo 44 , and spin-locking sequences.'
