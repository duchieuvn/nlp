  window: To see what the signals look like and how distinct they are, we will use a model based on coupled equations of motion for the two spin species. To model our method we can use the coupled Bloch equations for the spin polarisation of the alkali atoms, \mathbf{P^{e}} , and the noble gas atoms, \mathbf{P^{n}} . The superscripts reflect the fact that the alkali atom spin is dominated by the electron spin while the noble gas polarisation is due to its nuclear spin. The equations of motion can be written as [ 12 ] <starteqn> \frac{d\mathbf{P^{n}}}{dt} =\gamma_{n}\mathbf{(B}+\lambda M^{e}\mathbf{P^{e})\times P^{n}}+\bm{\Omega}\times\mathbf{P^{n}}+R_{se}^{en}\mathbf{P^{e}}-(R_{se}^{ne}+R_{c}^{n})\mathbf{P^{n}} <endeqn> where \mathbf{B} is an external magnetic field, \bm{\Omega} the angular velocity of rotation, \gamma_{e} is the electron gyromagnetic ratio of the alkali metal, \gamma_{n} is the nuclear gyromagnetic ratio of noble gas. Adding to the effect of the magnetic field there is also the magnetisation of the atomic species. The motion of \mathbf{P^{e}} and \mathbf{P^{n}} are driven by \lambda M^{n}\mathbf{P^{n}} and \lambda M^{e}\mathbf{P^{e}} respectively where \lambda is the coupling enhancement between the polarisations, and M^{(n,e)} are the maximum magnetisations of the atomic species.
