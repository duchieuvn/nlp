  window: 'The covariance matrix of two uncorrelated thermal modes is given by V_{\text{th}}=(n_{\text{th}}+1/2)\mathbb{1}_{4} , where n_{\text{th}} is the average number of photons in a single mode thermal state. where S_{A_{1}A_{2}}(r) is the two mode squeezing transformation given by <other_eqref> of the Appendix A . The covariance matrix of the TMSV state can be obtained by setting n_{\text{th}}=0 in <other_eqref>. Since TMST state is a Gaussian state with zero mean and covariance matrix given by <other_eqref>, the Wigner characteristic function of the TMST state can be readily evaluated using <other_eqref>: <starteqn> \chi(\Lambda)=\exp\big{[} -\kappa(\tau_{1}^{2}+\sigma_{1}^{2}+\tau_{2}^{2}+\sigma_{2}^{2})\cosh(2r)/2 +\kappa(\tau_{1}\tau_{2}-\sigma_{1}\sigma_{2})\sinh(2r)\big{]} <endeqn> where \kappa=(n_{\text{th}}+1/2) . Further, modes F_{1} and F_{2} are initialized to Fock states |m_{1}\rangle and |m_{2}\rangle . Now, mode A_{1} ( A_{2} ) is mixed with mode F_{1} ( F_{2} ), using a beam splitter of transmissivity T_{1} ( T_{2} ) respectively.'
