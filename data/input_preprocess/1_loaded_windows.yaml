  window: 'For the purpose of creating entangled photon pairs and quantum squeezed light, we focus on parametric processes that have fast growth rates. where c is the speed of light in vacuum and \varepsilon_{0} is the vacuum permittivity. In the simplest “fluid” model of plasmas, we neglect electron kinetic effects. The acceleration of the polarization current can then be written as <starteqn> \frac{\partial}{\partial t}\bm{J}=\frac{e^{2}n_{e}}{m_{e}\gamma}\bm{E} <endeqn> where e is the natural charge, n_{e} is the electron number density, m_{e} is the electron rest mass, and \gamma is the relativistic Lorentz factor. The explicit inclusion of \gamma reveals the first laser plasma interaction: If the laser field is sufficiently strong to drive the electron to relativistic speeds, the electron mass increases by a factor \gamma near the laser anti-nodes when it reaches its maximum kinetic energy. Assuming the electrons start from rest, the value of \gamma can be obtained using the conservation of canonical momentum, i.e., \gamma(t)\approx\sqrt{1+\alpha^{2}(t)} , where we introduced the parameter \bm{\alpha}=e\bm{A}/(m_{e}c^{2}) and its amplitude \alpha to denote the normalized laser amplitude.'
