  equation_id: '1'
  equation: \begin{pmatrix}\psi_{1}\ \psi_{2}\end{pmatrix}=\psi_{1}\begin{pmatrix}1\ 0\end{pmatrix}+\psi_{2}\begin{pmatrix}0\ 1\end{pmatrix}=\psi_{1}|0\rangle+\psi_{2}|1\rangle=|\psi\rangle
  window: 'While quantum computers that can solve meaningful problems exist, implementation of quantum computers is currently limited by practical hardware challenges [ 2 , 3 , 4 , 5 ] . Due to these complications, quantum computers of the immediate future will be notably small and noisy, leading to what many refer to as the Noisy Intermediate-Scale Quantum (NISQ) regime [ 6 ] . During this period, simulations of quantum computers and systems on classical hardware are of great interest because they allow us to explore problems that our current quantum computers are too small and noisy to explore, and because they raise the bar for verification of Quantum Supremacy claims [ 7 ] . A qubit can be represented as a 2-dimentional vector with complex coefficients, \left\{\psi_{1},\psi_{2}\right\}\in\mathbb{C} , in other words: <starteqn> \begin{pmatrix}\psi_{1}\ \psi_{2}\end{pmatrix}=\psi_{1}\begin{pmatrix}1\ 0\end{pmatrix}+\psi_{2}\begin{pmatrix}0\ 1\end{pmatrix}=\psi_{1}|0\rangle+\psi_{2}|1\rangle=|\psi\rangle <endeqn> Here, the basis vectors, |0\rangle and 1 \rangle , serve as the computational basis. To perform computations in the Schrödinger paradigm, these quantum states are acted upon by 2^{n}\times 2^{n} unitary matrices (i.e. \say gates), which are the tensor products of smaller gates that affect smaller subsets of the total qubit arrangement. For example, applying a single-qubit gate, U , to the k^{\text{th }} qubit in a quantum circuit is represented by the 2^{n}\times 2^{n} unitary transformation, A=I^{\otimes n-k-1}\otimes U\otimes I^{\otimes k} .'
- paper_id: '2401.11088'
