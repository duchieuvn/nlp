  equation: \nu=(N_{\uparrow}+N_{\downarrow})/L=1
  window: 'Periodic boundary conditions are applied to eliminate boundary effects. To recognize Floquet scarring states, we first describe QMBS states in the corresponding undriven system [ 17 ] . We use the following notations: \uparrow for spin up, \downarrow for spin down, 0 for an empty site, and \updownarrow for a doublon. At the filling factor <starteqn> \nu=(N_{\uparrow}+N_{\downarrow})/L=1 <endeqn> the undriven system hosts QMBS states in the regime \Delta\approx U\gg J , which can be conveniently probed using a quantum quench process from some special non-equilibrium initial states \ket{\psi_{s}} . A salient feature of QMBS states is the fidelity revival observed, during the time evolution that starts from the special initial states \ket{\psi_{s}} . However for quenches from other non-equilibrium initial states denoted as |\psi_{th}\rangle , the undriven system typically thermalizes quickly, in such cases, the fidelity F(t) rapidly decays to zero and remains near zero over time.'
