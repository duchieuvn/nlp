  equation: \Delta\phi_{R}=\tan^{-1}\left(\frac{P_{B_{R}}X_{A_{R}}-X_{B_{R}}P_{A_{R}}}{X_{B_{R}}X_{A_{R}}+P_{B_{R}}P_{A_{R}}}\right)
  window: The reference pulses and signals are then polarization multiplexed and transmitted across an atmospheric channel to Bob (subscript B ) at the ground station. The encoded reference pulse information is shared with Bob beforehand, while the signal information is unknown to Bob and contains the secure key. At the receiver, Bob demultiplexes the reference pulses and signals, measuring their quadrature values \{X_{B_{R}},P_{B_{R}}\} and \{X_{B_{S}},P_{B_{S}}\} , respectively. The encoded quadratures are distorted by the channel, resulting in a reference pulse phase error \Delta\phi_{R} , calculated as, <starteqn> \Delta\phi_{R}=\tan^{-1}\left(\frac{P_{B_{R}}X_{A_{R}}-X_{B_{R}}P_{A_{R}}}{X_{B_{R}}X_{A_{R}}+P_{B_{R}}P_{A_{R}}}\right) <endeqn> Likewise, the signal is also distorted by the channel and detector, accumulating a signal phase error \Delta\phi_{S} (calculated using the same method as Eq. 1 ). In our scheme, an RLO at the receiver is split into the RLO 1 and RLO 2 , where a heterodyne detector uses the RLO 1 to measure the reference pulse quadratures, such that \Delta\phi_{R} can be derived. Phase shifting the RLO 2 by \Delta\phi_{R} for each pulse provides a first approximation of the true signal phase error \Delta\phi_{S} , \Delta\phi_{R}\approx\Delta\phi_{S} , increasing the coherence between the signal and RLO 2 .
