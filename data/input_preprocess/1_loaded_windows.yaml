  equation: P_{A}=\frac{\left(P_{NI}-P_{D}\right)\cdot R}{P_{I}-P_{NI}}
  window: 'Non-illuminated gates between 42–44 ns exhibit suppressed counts because of the ultra-short hold-off time of 3 ns applied by the UNIC-SPD module. From the detection events, we extract the respective count probabilities for illuminated ( P_{I} ) and non-illuminated gates ( P_{NI} ). Dark count probability ( P_{D} ) was measured separately by turning the laser off. The afterpulsing probability is calculated by the standard method as follow: <starteqn> P_{A}=\frac{\left(P_{NI}-P_{D}\right)\cdot R}{P_{I}-P_{NI}} <endeqn> where R=125 is the ratio of the detector gating frequency (1.25 GHz) to the laser illumination frequency (10 MHz). where \mu is the average incident photon number per illumination pulse. By adjusting the amplitude of the 1.25 GHz clock input, we are able to vary the APD excess voltage and hence the detection efficiency.'
