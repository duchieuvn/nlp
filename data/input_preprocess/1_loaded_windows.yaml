  equation: \hat{H}_{\mathcal{C}}{\left|t\right>}=i\frac{\text{d}}{\text{d}t}{\left|t\right>}
  window: As usual, the eigenstates of \hat{t} are mutually orthogonal, meaning they are, in principle, distinguishable from one another. Since \hat{t} has a continuous range of distinguishable eigenstates, the clock’s dial has infinite resolution – this is an idealisation, as the dial of a real clock has finite resolution. While the Page-Wootters construction has also been extended to non-ideal clocks [ 11 , 12 , 13 ] , we will use ideal clocks with the understanding that they approximate the behaviour of ever more precise finite-dimensional real clocks. Due to Eq. 4 , which states that \hat{t} and \hat{H}_{\mathcal{C}} are conjugate observables, it also follows that <starteqn> \hat{H}_{\mathcal{C}}{\left|t\right>}=i\frac{\text{d}}{\text{d}t}{\left|t\right>} <endeqn> where to get from the first to the second line, we use the expression for \hat{\mathcal{H}} shown in <other_eqref>. The term {\left|\psi(t)\right>}\stackrel{{\scriptstyle\text{def}}}{{=}}\left.\kern-1.2% pt\left<t\left|\Psi\right>\right>\right.\kern-1.2pt is called the relative state [ 14 ] , as it represents the state of the rest of the universe, \mathcal{R} , relative to the clock being in state {\left|t\right>} . Hence, the Page–Wootters construction explains evolution in the apparent absence of the time parameter, \lambda , since despite the state of the composite system being stationary with respect to \lambda , \mathcal{R} changes relative to the clock \mathcal{C} .
