  window: 'Most works in Bohmian Mechanics refer to quantum trajectories corresponding to a simple integrable classical system of two or more dimensions, namely a sum of non interacting quantum harmonic oscillators. where \Phi_{m,n}^{(s)}=H_{m}(\bar{x})H_{n}(\bar{y}) and H are Hermite polynomials of degree m in \bar{x}=\sqrt{\frac{m_{x}\omega_{x}}{\hbar}}x and H_{n} of degree n in \bar{y}=\sqrt{\frac{m_{y}\omega_{y}}{\hbar}}y . The indices m,n (quantum numbers) can take any integer value in [0,\infty) . A simple case is a product state of only one component of the form: <starteqn> \Psi_{mn}=a\Psi_{m}(\bar{x})\Psi_{n}(\bar{y}) <endeqn> which does not have any chaos. In fact this is a product state (it has zero entanglement) and the corresponding Bohmian equations are decoupled, i.e. the x motion is independent from the y motion. Thus its Bohmian trajectories are periodic in the case of commensurable frequences and of Lissajous form in the case of non commensurable frequences.'
