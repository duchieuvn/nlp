  equation: V_{A_{1}A_{2}}=S_{A_{1}A_{2}}(r)V_{\text{th}}S_{A_{1}A_{2}}(r)^{T}
  window: We start with a TMST state with modes labeled by A_{1} and A_{2} . A TMST state can be produced by operating two mode squeezing transformation on two uncorrelated thermal modes. The covariance matrix of two uncorrelated thermal modes is given by V_{\text{th}}=(n_{\text{th}}+1/2)\mathbb{1}_{4} , where n_{\text{th}} is the average number of photons in a single mode thermal state. Therefore, the covariance matrix of the TMST state can be written as <starteqn> V_{A_{1}A_{2}}=S_{A_{1}A_{2}}(r)V_{\text{th}}S_{A_{1}A_{2}}(r)^{T} <endeqn> where S_{A_{1}A_{2}}(r) is the two mode squeezing transformation given by <other_eqref> of the Appendix A . The covariance matrix of the TMSV state can be obtained by setting n_{\text{th}}=0 in <eqref>. where \kappa=(n_{\text{th}}+1/2) .
