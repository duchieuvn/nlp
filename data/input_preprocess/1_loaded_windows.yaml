  window: In CV quantum optics, each quantum state is determined by the statistics of its quadrature vector, defined as \hat{\mathbf{R}}=\left(\hat{x}_{1},\hat{p}_{1},\dots,\hat{x}_{N},\hat{p}_{N}% \right)^{\top} , \hat{x}_{i} and \hat{p}_{i} are the quadrature operators of the i -th optical mode contained in the quantum state. Specifically, each of the external engineered pulses that we will couple to the cavity will have a quadrature vector \hat{\mathbf{R}}_{\text{in}}^{(k)} , where the label k stands for the order of the input state in the sequence, so it is a temporal label. Each of them will be the product state of single-mode squeezed states with classical information encoded in their phases. In that way, we can write the covariance matrix of every input state as [ 151 ] <starteqn> \text{cov}\left[\hat{\mathbf{R}}_{\text{in}}^{(k)},\hat{\mathbf{R}}_{\text{in}}^{(k)}\right]=\bigoplus_{i=1}^{N}\left(\begin{array}[]{cc}\cosh(\xi_{\text{in}})+\cos(\phi_{k})\sinh(\xi_{\text{in}})&\sin(\phi_{k})\sinh(\xi_{\text{in}})\ \sin(\phi_{k})\sinh(\xi_{\text{in}})&\cosh(\xi_{\text{in}})-\cos(\phi_{k})\sinh(\xi_{\text{in}})\end{array}\right)\  <endeqn> where \xi_{\text{in}} stands for the squeezing strength (we consider the same squeezing for every mode), and \phi_{k} is the squeezing phase, which is a function of a classical number s_{k} belonging to the classical input sequence that we want to process. with coupling parameters \alpha_{ij} and \beta_{ij} . If any of the \beta_{ij} terms are different from zero, the crystal generates squeezing and this increases the squeezing present in the circulating reservoir pulse.
