  equation_id: '5'
  equation: U\vec{\psi}=(R+iJ)(\vec{a}+i\vec{b})=(R\vec{a}-J\vec{b})+i(J\vec{a}+R\vec{b})
  window: 'We expand upon this literature by performing traditional floating-point Schrödinger-style simulation compressed with scalar and vector quantized amplitude values. In this work, we consider the computation of all complex amplitudes of the quantum state resulting from the execution of the circuit as well as intermediate steps. Furthermore, we are concerned with techniques to simulate general quantum circuits, so we eschew specialized simulation techniques which assume reduced gate sets [ 17 , 13 ] . We begin by noting that matrix multiplication can be conjugated into multiplication by constituent real and imaginary components <starteqn> U\vec{\psi}=(R+iJ)(\vec{a}+i\vec{b})=(R\vec{a}-J\vec{b})+i(J\vec{a}+R\vec{b}) <endeqn> We quantize each float in R , J , \vec{a} , and \vec{b} separately, then perform the multiplications in equation 5 for each gate application in the circuit (Algorithm 1 ). For n qubits, R and J each have 2^{2n} floating point values, while \vec{a} and \vec{b} each have 2^{n} floating point values. We compress the real and imaginary components of each complex number to the following precisions: double precision (float64, 128 bits/complex number), single precision (float32, 64 bits/complex number), half precision (float16, 32 bits/complex number), and bfloat16 (Figure 1 ), a precision popular in machine learning [ 18 , 19 ] .'
