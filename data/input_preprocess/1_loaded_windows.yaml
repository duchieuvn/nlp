  window: Due to the difficulties arising in defining chaos in SQM most works in the field have been focused on the behaviour of quantum systems whose classical counterparts have ordered or chaotic Dynamics [ 3 , 4 , 5 , 6 ] , something that has been characterized as ‘quantum chaology, not quantum chaos’ by Berry in [ 7 ] . However, Bohmian Quantum Mechanics (BQM), according to which the quantum particles follow well defined deterministic trajectories, similarly to CM, [ 8 , 9 , 10 ] gives us the opportunity to make a comparison between chaotic dynamics both in the classical and in the Bohmian quantum framework, based on the standard definition of chaos. This comparison is a fundamental problem that has not been addressed up to now and it is the main subject of the present paper. the solution of the Schrödinger equation <starteqn> -\frac{\hbar^{2}}{2m}\nabla^{2}\Psi+V\Psi=i\hbar\frac{\partial\Psi}{\partial t} <endeqn> We note that Bohmian Dynamics is non-autonomous and highly nonlinear. Thus when the dimension of the configuration space N_{c} is \dim(N_{c})\geq 2 one observes, in general, the coexistence of ordered and chaotic trajectories [ 11 , 12 , 13 ] . In fact, it has already been shown that there are cases where a classical system is integrable and the corresponding Bohmian quantum system is chaotic and there are cases where a chaotic classical system has an ordered Bohmian quantum counterpart.
