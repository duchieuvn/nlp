  equation: (\frac{\partial^{2}}{\partial t^{2}}-c^{2}\frac{\partial^{2}}{\partial z^{2}})\bm{E}=\frac{1}{\varepsilon_{0}}\frac{\partial}{\partial t}\bm{J}
  window: In Sec. V, we present our conclusions and discussions. Fully ionized plasmas, consisting of both electrons and ions (or positrons), can mediate laser interactions through a variety of processes. For the purpose of creating entangled photon pairs and quantum squeezed light, we focus on parametric processes that have fast growth rates. For this purpose, we analyze the motion of electrons in a laser field which creates a polarization current \bm{J} that drives the laser field \bm{E} through the wave equation <starteqn> (\frac{\partial^{2}}{\partial t^{2}}-c^{2}\frac{\partial^{2}}{\partial z^{2}})\bm{E}=\frac{1}{\varepsilon_{0}}\frac{\partial}{\partial t}\bm{J} <endeqn> where c is the speed of light in vacuum and \varepsilon_{0} is the vacuum permittivity. In the simplest “fluid” model of plasmas, we neglect electron kinetic effects. where e is the natural charge, n_{e} is the electron number density, m_{e} is the electron rest mass, and \gamma is the relativistic Lorentz factor.
