  window: 'Note that by “spectrum”, we are referring to the Lanczos spectrum, not the spectrum of eigenvalues. Although inspired by the seminal work by Dumitriu and Edelman Dumitriu:2002beta in RMT, ( 1 ) applies to any generic system (chaotic or integrable) with having continuous large d limit, with or without the RMT description Balasubramanian:2022dnj . The Sachdev-Ye-Kitaev (SYK) model PhysRevLett.70.3339 ; Kittu is a N fermionic interaction model where p fermions interact simultaneously. The Hamiltonian is given by: <starteqn> H=i^{p/2}\sum_{1\leq i_{1}<i_{2}\cdots i_{p}\leq N}j_{i_{1}\cdots i_{p}}\,\chi_{i_{1}}\cdots\chi_{i_{p}}\ <endeqn> where j_{i_{1}\cdots i_{p}} are random parameters drawn from a distribution with zero mean and specified variance. The fermions \chi_{i_{k}} obey the anti-commutation relation among themselves. The model is analytically tractable in the large N and large, finite p limit, where the large N limit is taken before the large p limit Maldacena:2016hyu .'
