  window: 'Also, the Lanczos coefficients are not unique; they depend on the chosen initial state which is fed to the Lanczos algorithm. Thus, it can be more insightful to consider statistical questions: Are there correlations between the distribution of eigenvalues, such as the density of states (DOS), and the statistical properties of the Lanczos coefficients? As it turns out, the answer is affirmative and addressed in Balasubramanian:2022dnj . Given the eigenvalues E_{i} of a Hermitian random matrix, the average DOS \rho(E) is related to the average or mean Lanczos coefficients by <starteqn> \rho(E)=\int_{0}^{1}dx\,\frac{\Theta(4\mathsf{b}(x)^{2}-(E-\mathsf{a}(x))^{2})}{\pi\sqrt{4\mathsf{b}(x)^{2}-(E-\mathsf{a}(x))^{2}}}\ <endeqn> where \Theta(z) is the Heaviside Theta function and \mathsf{a}(x) and \mathsf{b}(x) are the mean Lanczos coefficients, averaged over ensembles. Here x=n/d\in[0,1] , with n\leq d as a rescaled parameter for the coefficients \{\mathsf{a}_{n},\mathsf{b}_{n}\} , and d is the dimension of the Krylov space which is upper bounded by the dimension of the Hilbert space or the matrix size. The derivation of ( 1 ) can be found in Balasubramanian:2022dnj .'
