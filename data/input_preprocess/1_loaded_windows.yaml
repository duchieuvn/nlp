  window: 'Figure 5 illustrates our low-loss capacitor implementation with open-ended coplanar waveguide stubs. in which Z_{\mathrm{stub}} is the characteristic impedance of the coplanar stub, and \omega_{\mathrm{qw}}=(\pi\nu)/(2l) is the quarter-wave resonant frequency of the coplanar stub. In the expression of \omega_{\mathrm{qw}} , \nu and l are the wave velocity and the physical length of the coplanar stub, respectively. In the limit where the frequency of interest \omega is much smaller than the resonant frequency \omega_{\mathrm{qw}} , the input impedance of an open-ended stub can be well approximated by a series combination of capacitor C_{\mathrm{stub}} and inductor L_{\mathrm{stub}} to ground: <starteqn> Z_{\mathrm{stub}}(\omega) \approx\frac{1}{j\omega\left(\pi/2\omega_{\mathrm{qw}}Z_{\mathrm{stub}}\right)}+j\omega\left(\frac{\pi Z_{\mathrm{stub}}}{6\omega_{\mathrm{qw}}}\right) =\frac{1}{j\omega C_{\mathrm{stub}}}+j\omega L_{\mathrm{stub}} <endeqn> The inductance contribution j\omega L_{\mathrm{stub}} , a higher-order expansion term, is only significant at large \omega/\omega_{qw} values. For the Floquet TWPA design considered in this work, the capacitance term alone is adequate. Equation 5 shows that the effective capacitance C_{\mathrm{stub}} is linearly proportional to the stub length l , allowing the desired ground capacitance profile C_{g}(x) to be implemented by controlling the lengths and the resonant frequencies of the stubs.'
