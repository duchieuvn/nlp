  window: In the classical limit, the associated expectation value- a phase space integral- may then be evaluated (or bounded). As may be expected by dimensional analysis and is indeed borne out by explicit calculation, this invariably similarly leads [ 5 ] to <other_eqref>. <other_eqref> is derived along these lines for few-body observables that are a functions of the spatial coordinates alone (i.e., contain no momentum dependence). The simple (variance type) pure state quantum mechanical uncertainty relations <starteqn> \sigma_{A}\leavevmode\nobreak\ \sigma_{B}\geq\frac{1}{2}\left|\big{\langle}[A,B]\big{\rangle}\right| <endeqn> undergo no change 2 2 2 This extension is, of course, very well known yet not always derived expediently. To quickly demonstrate this, we may, e.g., introduce [ 5 ] a (modified trace type) inner product (A,B)\equiv{\sf Tr}(\rho_{\Lambda}A^{\dagger}B) which is manifestly positive semi-definite, (A,A)={\sf Tr}(\rho_{\Lambda}A^{\dagger}A)\geq 0 (and thus defines an inner product space for which the Cauchy–Schwarz inequality applies). We may now observe that the standard proof of the pure state variance type uncertainty relations can be repeated verbatim with the substitution of this inner product instead of the conventional one ( \langle a|b\rangle ) between states to immediately yield <eqref>.
