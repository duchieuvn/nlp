  window: 'Due to these complications, quantum computers of the immediate future will be notably small and noisy, leading to what many refer to as the Noisy Intermediate-Scale Quantum (NISQ) regime [ 6 ] . During this period, simulations of quantum computers and systems on classical hardware are of great interest because they allow us to explore problems that our current quantum computers are too small and noisy to explore, and because they raise the bar for verification of Quantum Supremacy claims [ 7 ] . Here, the basis vectors, |0\rangle and 1 \rangle , serve as the computational basis. Thus, the vector describing the qubit can be seen as a superposition of these two basis vectors with complex coefficients and the additional normalization constraint: <starteqn> \left|\psi_{1}\right|^{2}+\left|\psi_{2}\right|^{2}=1 <endeqn> To perform computations in the Schrödinger paradigm, these quantum states are acted upon by 2^{n}\times 2^{n} unitary matrices (i.e. \say gates), which are the tensor products of smaller gates that affect smaller subsets of the total qubit arrangement. For example, applying a single-qubit gate, U , to the k^{\text{th }} qubit in a quantum circuit is represented by the 2^{n}\times 2^{n} unitary transformation, A=I^{\otimes n-k-1}\otimes U\otimes I^{\otimes k} . Our lossy compression schemes strive to preserve the quantum fidelity between the original vector and our lossy reconstruction.'
