  window: Thus the fixed temperature, or the size of \partial\mathcal{M}_{\mathrm{E}} in the \tau direction, plus the fixed volume define a canonical ensemble. The partition function ( 1 ) should be considered a provisional prescription for manifolds \mathcal{M}_{\mathrm{E}} with closed spatial sections; otherwise a Hawking-Gibbons-York (HGY) term and counterterms should be included. Together with the closedness in the \tau direction, the desired saddle manifold should have a closed topology similar to the original Euclidean dS space. The partition function ( 1 ) was shown Jacobson:2022jir to admit spherical saddle metrics of the form <starteqn> ds^{2}_{\mathrm{E}}=h(r)d\tau^{2}+\frac{1}{f(r)}dr^{2}+r^{2}d\Omega_{D-2}^{2} <endeqn> for both zero and nonzero \Lambda_{0} . Here d\Omega_{D-1}^{2} is the induced metric on a D-2 dimensional sphere. where l is the radial proper distance from the Euclidean horizon.
