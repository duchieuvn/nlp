  window: In the low energy effective action of whatever theory provides the UV completion to General Relativity, such theories are generically expected to appear, and are known to modify the entropy of a black hole Wald:1993nt . It is therefore natural to inquire as to how they affect the entropy of a volume of space. For simplicity, we consider Lovelock gravity since the quasi-local energy in Lovelock theory is given by an integral on the system’s boundary Kastikainen:2019iaz , affording the same interpretation of dS entropy as the dimension of Hilbert space as for GR Fischler:2000fe ; Banks:2000fe . The only change we make to ( 1 ) is the replacement of I_{\mathrm{E}} by the general Lovelock action Zumino:1985dp , <starteqn> \mathcal{I}_{\mathrm{E}}=\frac{1}{16\pi}\sum_{p=0}\int_{\mathcal{M}_{\mathrm{E}}}\frac{\alpha_{p}}{(D-2p)!}\mathcal{R}^{(p)} <endeqn> where the \alpha_{p} are coupling constants. The D -form \mathcal{R}^{(p)} is given by the antisymmetrization of exterior products of p curvature 2 -forms 1 1 1 R^{ab} is antisymmetric in the two indices. where the total antisymmetric tensor \epsilon is defined by \epsilon_{0\cdots(D-1)}=+1 in an orthonormal basis.
