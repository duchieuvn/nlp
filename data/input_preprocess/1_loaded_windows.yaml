  equation_id: '1'
  equation: \boldsymbol{x}^{\text{out}}(t)=\mathbfcal{G}^{t}[\boldsymbol{x}^{\text{in}}]
  window: 'Finally, in Section VI we explore the implications of the theory of quantum LTI systems developed in the preceding sections to the Schawlow-Townes limit in laser theory [ 32 ] and to quantum noise in gravitational wave detectors such as LIGO. We begin by studying “black box” systems with a known relationship between their inputs and outputs but without assuming any knowledge of their internal dynamics. We will show that by making the minimal assumptions of linearity and time-shift invariance, these systems are fully characterized by a set of “transfer functions” that dictate both their response to classical fields and to quantum noise. To wit, consider a classical system that maps some set of n inputs, \boldsymbol{x}^{\text{in}}(t)=\{x_{i}^{\mathrm{{in}}}(t)\}_{i=1,\ldots,n} to some set of m outputs \boldsymbol{x}^{\text{out}}(t)=\{x_{i}^{\mathrm{{out}}}(t)\}_{i=1,\ldots,m} through a dynamical map \mathbfcal{G}^{t} at each time t via <starteqn> \boldsymbol{x}^{\text{out}}(t)=\mathbfcal{G}^{t}[\boldsymbol{x}^{\text{in}}] <endeqn> As far as the input-output description is concerned, the system is the set of maps \{\mathbfcal{G}^{t}\} . We now make two key assumptions: that the dynamical maps are linear and time-translation invariant . These notions are defined precisely as follows.'
- paper_id: '2410.09976'
  equation_id: '2'
  equation: \mathbfcal{G}^{t}[\lambda\boldsymbol{x}+\lambda^{\prime}\boldsymbol{x}^{\prime}]=\lambda\mathbfcal{G}^{t}[\boldsymbol{x}]+\lambda^{\prime}\mathbfcal{G}^{t}[\boldsymbol{x}^{\prime}]
  window: 'As far as the input-output description is concerned, the system is the set of maps \{\mathbfcal{G}^{t}\} . We now make two key assumptions: that the dynamical maps are linear and time-translation invariant . These notions are defined precisely as follows. A classical system \{\mathbfcal{G}^{t}\} is linear if <starteqn> \mathbfcal{G}^{t}[\lambda\boldsymbol{x}+\lambda^{\prime}\boldsymbol{x}^{\prime}]=\lambda\mathbfcal{G}^{t}[\boldsymbol{x}]+\lambda^{\prime}\mathbfcal{G}^{t}[\boldsymbol{x}^{\prime}] <endeqn> for all square-integrable functions \boldsymbol{x},\boldsymbol{x^{\prime}} and all constants \lambda,\lambda^{\prime} at each instant t . In general, a linear system’s map, \mathbfcal{G}^{t} from its n inputs to its m outputs can be decomposed in terms of a collection of maps, \mathbfcal{G}^{t}_{ij} from its j^{\text{th}} input port to its i^{\text{th}} output port (see Lemma 1 ). Given the time-translation operator \mathcal{T}^{s} , defined by, \mathcal{T}^{s}[f(t)]\coloneqq f(t-s) , the classical linear system \{\mathbfcal{G}^{t}\} is said to be linear time-translation-invariant (LTI) if its dynamical map commutes with the time-translation operator, i.e.'
- paper_id: '2410.09976'
