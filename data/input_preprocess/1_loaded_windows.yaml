  equation: \bra{x}H\ket{y}\leq 0\quad\text{for}\quad x\neq y
  window: Following this, in Section II.3 , we perform a numerical investigation of conditional correlations in several well-studied spin systems. Another property of a many-body quantum state that can affect conditional independence in its measurement distribution is the sign structure of its amplitudes. A wide class of commonly studied local Hamiltonians enjoy the feature that their off-diagonal terms are non-positive. That is, in a local basis \{\ket{x}:x\in\{0,1\}^{n}\} , we have <starteqn> \bra{x}H\ket{y}\leq 0\quad\text{for}\quad x\neq y <endeqn> Such Hamiltonians are called sign-free or “stoquastic”. The (unique) ground state of a sign-free Hamiltonian is a quantum state \ket{\psi}=\sum_{x}\psi(x)\ket{x} with non-negative amplitudes \psi(x)\geq 0 . In the absence of topological order, the non-negativity of the amplitudes can constrain the amount of post-measurement entanglement that can be formed in the state.
