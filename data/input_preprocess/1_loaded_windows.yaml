  equation: G_{v}(t)\geq\max\left\{G_{v}(0)-t\left|\frac{dG_{v}}{dt}\right|_{\max},0\right\}
  window: If single particle displacements can be measured, then D_{+} can, in principle, be experimentally determined for general finite t^{v} . This is so since D_{+}=\partial_{t}(\langle\Delta r^{H}_{il}(t))^{2}\rangle/2 when this derivative is evaluated at t=t^{v} . A simple generalization of this time derivative of squared displacement relation holds for times t_{s}<t^{v} with the integral of G_{v} in <other_eqref> performed up to time t_{s} instead of t^{v} . To bound D_{+} , note that for 0\leq t\leq t^{v} , <starteqn> G_{v}(t)\geq\max\left\{G_{v}(0)-t\left|\frac{dG_{v}}{dt}\right|_{\max},0\right\} <endeqn> where \left|\frac{dG_{v}}{dt}\right|_{\max} is the maximum absolute value of the autocorrelation function time derivative for t\in[0,t^{v}] . The ratio appearing on the righthand side of this inequality is the area of a triangle whose height is G_{v}(0) and has a base of value t_{\min} - the shortest possible time for G_{v}(t) (that is consistent with the local uncertainty relations) to drop to zero. The single particle momentum component p^{H}_{i\ell}(t) (and hence velocity v^{H}_{i\ell}(t) ) commutes with all terms in the Hamiltonian of <other_eqref> except for the sum of the interaction terms, \tilde{H}_{i}^{H}(t)=V^{H}_{i}(t)\equiv\sum_{j}{\cal V}^{H}_{ij}(t) , that involve the spatial coordinates of particle i and thus contribute to the time derivative of (v_{i\ell}^{H}(t)v^{H}_{i\ell}(0)) in Heisenberg’s equation of motion.
