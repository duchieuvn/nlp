  window: 'The equal quasienergy separation of the towers is responsible for quantum revivals: the quasienergy separation equals the revival frequency \omega_{r}\approx\delta\varepsilon (the similar property is also noted in Refs. [ 23 , 31 ] ). Combining the relation \delta E=2\delta\varepsilon , it gives the doubling period T_{r}\approx 2T_{*} . To uncover the dependence of \omega_{r} on the driving parameters, we first search for potential Floquet scarring states. In particular, we fix \Delta=10 and scan the parameter plane of U_{0} and U_{m} to calculate the average fidelity for different driving frequencies: <starteqn> \langle F\rangle_{t}=\frac{1}{\tau}\int_{0}^{\tau}F(t)dt <endeqn> where the upper integration bound \tau is set as 50 . In an approximate sense, the average fidelity characterizes the revivals. Note that a high value of the average fidelity is not necessarily indicative of revivals, as it may be the result of many-body localization or extremely slow thermalization.'
