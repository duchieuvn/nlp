  equation_id: '3'
  equation: K(x_{\text{i}},x_{\text{j}})=\text{tr}{\rho(x_{\text{i}})\rho(x_{\text{j}})}=|\langle\psi(x_{\text{i}})|\psi(x_{\text{j}})\rangle|^{2}
  window: 'Theoretical analyses indicated that QSVM could perform these matrix inversions with \mathcal{O}(\log(NM)) complexity [ 6 ] , a significant improvement over classical approaches. Quantum parallelism further reduces computational overhead by allowing simultaneous calculation of many kernel matrix elements, crucial for SVM optimization. Within the QSVM framework, data points x_{\text{i}} are non-linearly transformed into quantum states \rho(x_{\text{i}})=|\psi(x_{\text{i}})\rangle\langle\psi(x_{\text{i}})| within the Hilbert space. The inner product between these quantum states, crucial for constructing the kernel matrix K(x_{\text{i}},x_{\text{j}}) , is given by: <starteqn> K(x_{\text{i}},x_{\text{j}})=\text{tr}{\rho(x_{\text{i}})\rho(x_{\text{j}})}=|\langle\psi(x_{\text{i}})|\psi(x_{\text{j}})\rangle|^{2} <endeqn> with |0^{\otimes N}\rangle representing the initial state with all qubits in the |0\rangle state. QSVM extends classical SVM by utilizing quantum superposition and entanglement to address large, complex datasets more efficiently. Quantum parallelism enables rapid evaluation of kernel functions across multiple data pairs, a task that is computationally expensive classically [ 33 ] .'
