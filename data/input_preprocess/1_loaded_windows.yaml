  window: 'in terms of the Fourier transforms of the inputs and outputs (see Appendix B for a proof), and the transfer function matrix \boldsymbol{G}[\omega] is uniquely related to \{\mathbfcal{G}^{t}\} . To extend the notion of a LTI system from the classical to quantum domain, we note that inputs and outputs to a quantum system, in contrast to classical ones, need to be described by operator-valued stochastic processes. A convenient mathematical model is that of quantum noises defined as follows, and realized in practice by the quadratures of traveling electromagnetic fields [ 33 ] , or voltages and currents in a transmission line [ 34 , 15 , 35 ] , typically used to drive and probe quantum optical or electronic systems. Quantum noises are pairs of operator-valued stochastic processes \{\hat{q}_{i}(t),\hat{p}_{i}(t)\}_{i=1,\ldots,n} that satisfy <starteqn> [\hat{q}_{i}(t),\hat{q}_{j}(t^{\prime})]&=0\ [\hat{p}_{i}(t),\hat{p}_{j}(t^{\prime})]&=0\ [\hat{q}_{i}(t),\hat{p}_{j}(t^{\prime})]&=\mathrm{i}\delta_{ij}\delta(t-t^{\prime}) <endeqn> By a quantum LTI system we have in mind the scenario depicted in Fig. 1 : a set of n input ports and m output ports are accessible for classical response measurements — i.e. the inputs are driven by classical signals and their classical output response is measured; the observed classical response of the system satisfies the LTI assumptions in Eqs. 2 and 3 , i.e. where \boldsymbol{x}\coloneqq\expectationvalue*{\boldsymbol{\hat{x}}} denotes the expectation values of the input \boldsymbol{\hat{x}}^{\text{in}}(t)\coloneqq[\hat{q}^{\text{in}}_{1}(t),...,% \hat{q}^{\text{in}}_{n}(t),\hat{p}^{\text{in}}_{1}(t),...,\hat{p}^{\text{in}}_% {n}(t)]^{T} and output \boldsymbol{\hat{x}}^{\text{out}}(t)\coloneqq[\hat{q}^{\text{out}}_{1}(t),...,% \hat{q}^{\text{out}}_{m}(t),\hat{p}^{\text{out}}_{1}(t),...,\hat{p}^{\text{out% }}_{m}(t)]^{T} . Since this definition only relies on the expectation values of quantum noises, we can determine whether a quantum system is LTI through classical measurements.'
