  window: 'As usual, the eigenstates of \hat{t} are mutually orthogonal, meaning they are, in principle, distinguishable from one another. Since \hat{t} has a continuous range of distinguishable eigenstates, the clock’s dial has infinite resolution – this is an idealisation, as the dial of a real clock has finite resolution. While the Page-Wootters construction has also been extended to non-ideal clocks [ 11 , 12 , 13 ] , we will use ideal clocks with the understanding that they approximate the behaviour of ever more precise finite-dimensional real clocks. The three assumptions described in <other_eqref>, ( 3 ), and ( 4 ) can be used to demonstrate that the rest of the universe will evolve according to the Schrödinger equation relative to clock time: taking the inner product of the universal state vector and an eigenstate {\left|t\right>} of the clock, one finds that <starteqn> \leftrightarrow {\left<t\right|}\hat{H}_{\mathcal{R}}\otimes\hat{1}_{\mathcal{C}}\left|\left.\kern-1.2pt\Psi\right>\right>=-{\left<t\right|}\hat{1}_{\mathcal{R}}\otimes\hat{H}_{\mathcal{C}}\left|\left.\kern-1.2pt\Psi\right>\right> <endeqn> where to get from the first to the second line, we use the expression for \hat{\mathcal{H}} shown in <other_eqref>. The term {\left|\psi(t)\right>}\stackrel{{\scriptstyle\text{def}}}{{=}}\left.\kern-1.2% pt\left<t\left|\Psi\right>\right>\right.\kern-1.2pt is called the relative state [ 14 ] , as it represents the state of the rest of the universe, \mathcal{R} , relative to the clock being in state {\left|t\right>} . Hence, the Page–Wootters construction explains evolution in the apparent absence of the time parameter, \lambda , since despite the state of the composite system being stationary with respect to \lambda , \mathcal{R} changes relative to the clock \mathcal{C} .'
