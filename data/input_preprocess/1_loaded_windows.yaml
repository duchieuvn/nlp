  equation: \mathbf{H}= \theta\cdot\sum_{i=1}^{n}\sum_{j=1}^{n}\text{Cov}(i,j)\left(\sum_{k=1}^{K}p_{k}2^{k-1}x_{i,k}\right)\left(\sum_{k=1}^{K}p_{k}2^{k-1}x_{j,k}\right) -M\cdot\left[\left(\sum_{i=1}^{n}\left(\sum_{k=1}^{K}p_{k}2^{k-1}x_{i,k}\right)\cdot r_{i}\right)-R\right]^{2}
  window: 'where \theta is a scaling parameter for the original objective term (risk), and M is a penalty parameter for the constraint term (return) that penalizes constraint violation relative to the objective function. where \mathbf{H} denotes the objective function, x_{i}\in\{0,1\} is the i-th binary decision variable, a_{i} ’s are the coefficients of the linear terms, and b_{i,j} ’s are the coefficients of the quadratic terms. where g(x) is the exterior penalty function, M is the penalty coefficient, and the index i refers to each decision variable in the system. In order to solve the problem with proportional investments in the QUBO framework, a binarization technique is introduced in the QUBO model via binary expansion to accommodate proportional investments, which as a result leading to the following QUBO formulation [ 20 ] : <starteqn> \mathbf{H}= \theta\cdot\sum_{i=1}^{n}\sum_{j=1}^{n}\text{Cov}(i,j)\left(\sum_{k=1}^{K}p_{k}2^{k-1}x_{i,k}\right)\left(\sum_{k=1}^{K}p_{k}2^{k-1}x_{j,k}\right) -M\cdot\left[\left(\sum_{i=1}^{n}\left(\sum_{k=1}^{K}p_{k}2^{k-1}x_{i,k}\right)\cdot r_{i}\right)-R\right]^{2} <endeqn> where x_{i,k} denotes the k -th binary decision variable associated with asset i , representing a fraction of the proportional investment. The term p_{K}=1/2^{K} represents the granularity level of the binary encoding using K bits, facilitating a granular allocation of investment proportions. Parameter tuning plays a significant role in optimizing model performance such as the speed and quality of the solution [ 17 , 18 , 19 ] .'
