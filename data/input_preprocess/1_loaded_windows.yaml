  window: However, the Hamiltonian H commutes with the parity operator \Pi=\exp(i\pi\hat{P}) where \hat{P}=S_{z}+\sum_{n=1}^{N_{c}}a_{n}^{{\dagger}}a_{n} , and thus the system possesses a global Z_{2} symmetry, the breaking of which signals the optical switching from a normal phase to two degenerate superradiant phases. It is important to note that the system can directly extract photons from the vacuum due to the CRW terms a_{n}^{{\dagger}}S_{+} in the Hamiltonian H , where S_{\pm}=S_{x}\pm iS_{y} are the collective spin ladder operators. Because the spin system here is coupled to the tunneling-coupled cavities at multiple locations, such a configuration may be regarded as cavities plus “giant atoms” [ 37 , 38 , 39 , 40 ] , which has been realized at different experimental platforms such as ferromagnetic spin ensemble and superconducting artificial atoms [ 41 , 42 , 43 ] . To account for the impact of dissipation, the dynamical evolution of the spin-cavity system can be described by a density matrix \hat{\rho}\left(t\right) satisfying the following Lindblad master equation <starteqn> \frac{\partial\hat{\rho}}{\partial t}=-\frac{i}{\hbar}\left[H\left(t\right),\hat{\rho}\right]+\kappa\sum_{n}\mathcal{D}\left[a_{n}\right]\hat{\rho}+\frac{\gamma}{N}\mathcal{D}\left[S_{-}\right]\hat{\rho}\text{,} <endeqn> where the Lindblad dissipators are \mathcal{D}[a_{n}]\hat{\rho}=2a_{n}\hat{\rho}a_{n}^{{\dagger}}-\{a_{n}^{{% \dagger}}a_{n},\hat{\rho}\} and \mathcal{D}[S_{-}]\hat{\rho}=2S_{-}\hat{\rho}S_{+}-\{S_{+}S_{-},\hat{\rho}\} . Clearly, the first term on the right-hand side of <eqref> represents the standard Hamiltonian evolution while the other two terms describe the dissipation of the cavities and the spin system respectively. Given that some ferromagnetic spin ensembles or artificial atom systems like superconducting qubits can be controlled to work with a dissipation rate in the kilohertz regime, much lower in comparison with other physical quantities in megahertz and even gigahertz regime [ 44 , 45 , 46 ] , here we neglect the dissipation rate of two-level emitters and hence set \gamma=0 in our following analysis.
