  equation: '|\gamma\rangle=C_{\rm{bare}}|\gamma_{\rm{bare}}\rangle+C_{V}|V\rangle+...+C_{q}|q\bar{q}\rangle'
  window: 'In its bare state, the photon can only be involved in electromagnetic interactions, such as Compton scattering. However, the photon can also fluctuate into a virtual q\bar{q} pair, which may then scatter with the target via the strong nuclear force. With quantum numbers J^{PC}=1^{--} , the photon preferentially fluctuates into a vector meson. The wave function of a photon can be expressed through a Fock decomposition [ 77 ] : <starteqn> |\gamma\rangle=C_{\rm{bare}}|\gamma_{\rm{bare}}\rangle+C_{V}|V\rangle+...+C_{q}|q\bar{q}\rangle <endeqn> Here, C_{\rm{bare}}\approx 1 and C_{V}\sim\sqrt{\alpha} ( V=\rho,\omega,\phi,J/\psi,... ), and \alpha\approx 1/137 is the fine-structure constant. The coefficient C_{V} is determined by the photon-vector meson coupling, f_{V} , through C_{V}=\sqrt{4\pi\alpha}/f_{V} , where the coupling f_{V} can be extracted from the vector meson leptonic decay width \Gamma(V\rightarrow e^{+}e^{-}) . The fluctuated product subsequently interacts with the target particle and emerges as real, a phenomenon known as photoproduction.'
