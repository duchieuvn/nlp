  window: 'We use the following notations: \uparrow for spin up, \downarrow for spin down, 0 for an empty site, and \updownarrow for a doublon. the undriven system hosts QMBS states in the regime \Delta\approx U\gg J , which can be conveniently probed using a quantum quench process from some special non-equilibrium initial states \ket{\psi_{s}} . A salient feature of QMBS states is the fidelity revival observed, during the time evolution that starts from the special initial states \ket{\psi_{s}} . The fidelity is represented by the overlap between the time-evolved quantum state \ket{\psi(t)} and its initial state \ket{\psi_{0}} , which is defined as <starteqn> F(t)\equiv|\!\braket{\psi(t)}{\psi_{0}}\!|^{2} <endeqn> However for quenches from other non-equilibrium initial states denoted as |\psi_{th}\rangle , the undriven system typically thermalizes quickly, in such cases, the fidelity F(t) rapidly decays to zero and remains near zero over time. Differing from previous work [ 17 ] , we treat the full chain directly, following the numerical methods in Ref. [ 40 ] . The details are provided in Appendix A .'
