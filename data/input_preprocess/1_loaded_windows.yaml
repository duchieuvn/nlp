  window: This assertion has since received several lines of support Banks:2003ta ; Banks:2006rx ; Dong:2018cuv ; Banihashemi:2022jys ; Chandrasekaran:2022cip ; Lin:2022nss . Furthermore, the concept of gravitational entropy requires a general description since it can be associated with the area of any boundary separating a region of space Jacobson:2003wv ; Bianchi:2012ev , and not only to the area of black hole or dS horizons. Recently, Jacobson and Visser Jacobson:2022jir considered some of these issues by adding a spatial volume constraint to the Euclidean path integral. They proposed a partition function with a Lagrange multiplier \lambda(\tau) of the form <starteqn> Z=\iint\mathcal{D}\lambda\mathcal{D}g\exp{\bigg{(}-I_{\mathrm{E}}+\int d\tau\lambda(\tau)\hat{\mathcal{C}}}\bigg{)} <endeqn> The first term in the exponential in ( 1 ) is performed on a Euclidean manifold \mathcal{M}_{\mathrm{E}} of dimension D with a periodic boundary condition on the imaginary time x^{0}=\tau . The second term imposes the volume constraint on each constant- \tau slice with induced metric \gamma_{ij} . The temperature, as the reciprocal of the period \beta in \tau , arises from by eliminating the conical singularity at the horizon.
