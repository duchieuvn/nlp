  equation: \boldsymbol{x}^{\text{out}}[\omega]=\boldsymbol{G}[\omega]\boldsymbol{x}^{\text{in}}[\omega]
  window: for all inputs x , input and output ports, i,j , and times t,s . The assumption of linearity is well-justified for a large class of systems since any system will respond approximately linearly to sufficiently small signals (as long as its dynamical map’s first derivatives with respect to these signals are non-vanishing, which defines the linear operating point). Systems that do not have an internal time reference, i.e. are autonomous in their internal mechanism, satisfy the assumption of time-translation invariance. Together, the LTI assumptions imply several key properties, of which the most pertinent is that the input-output response in Eq. 1 can be put in the form <starteqn> \boldsymbol{x}^{\text{out}}[\omega]=\boldsymbol{G}[\omega]\boldsymbol{x}^{\text{in}}[\omega] <endeqn> in terms of the Fourier transforms of the inputs and outputs (see Appendix B for a proof), and the transfer function matrix \boldsymbol{G}[\omega] is uniquely related to \{\mathbfcal{G}^{t}\} . To extend the notion of a LTI system from the classical to quantum domain, we note that inputs and outputs to a quantum system, in contrast to classical ones, need to be described by operator-valued stochastic processes. A convenient mathematical model is that of quantum noises defined as follows, and realized in practice by the quadratures of traveling electromagnetic fields [ 33 ] , or voltages and currents in a transmission line [ 34 , 15 , 35 ] , typically used to drive and probe quantum optical or electronic systems.
