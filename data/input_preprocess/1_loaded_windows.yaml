  equation: \mathrm{e}^{-\mathrm{i}H_{X}\delta t} =\prod_{i}\mathrm{e}^{-\mathrm{i}h(t)\delta tX_{i}}=\prod_{i}\mathrm{R}_{X_{i}}(2h(t)\delta t)\
  window: We consider quantum circuits composed of N qubits and P layers of gates. In each layer, a parameterized single-qubit gate R_{X} is applied to each qubit, and two-qubit gates R_{ZZ} are applied to chosen qubit pairs. where X_{i} and Z_{i} are Pauli operators, J is the coupling between nearest-neighbour spins on the chosen graph, and h_{i}(t) is the time-dependent transverse field acting on qubit i . Indeed, from the first-order Trotter decomposition of the time-evolution operator, we get <starteqn> \mathrm{e}^{-\mathrm{i}H_{X}\delta t} =\prod_{i}\mathrm{e}^{-\mathrm{i}h(t)\delta tX_{i}}=\prod_{i}\mathrm{R}_{X_{i}}(2h(t)\delta t)\ <endeqn> where the total evolution time T is discretized into \frac{T}{\delta t} Trotter steps, -2J\delta t=\phi , and 2h(t)\delta t=\theta . We set \phi=-\frac{\pi}{2} , following the approach of Ref. [ 4 ] , despite employing a different circuit transpilation method. The angles \theta for the R_{X} gates are randomly selected from a uniform distribution within the interval [0,\frac{\pi}{2}] .
- paper_id: '2404.07802'
  equation_id: '11'
  equation: m_{\boldsymbol{z}}=\frac{1}{N}\sum_{n=1}^{N}z_{n}\equiv\frac{1}{N}\sum_{n=1}^{N}\left<\psi_{\textrm{out}}\right|Z_{n}\left|\psi_{\textrm{out}}\right>\,;
  window: 'To accurately model the noise characteristics of the IBM Guadalupe chip, we need to transpile our ideal quantum circuit into a form that can be executed on the quantum device, using the available gate set. This process is performed by Qiskit and is visualized in Fig. 1 . While the arrays \boldsymbol{\theta} and \boldsymbol{q} uniquely identify each circuit realization and, hence, are suitable to perform purely classical supervised learning, we augment the circuit description with the set of noisy expectation values that would be produced by noisy quantum circuits, as discussed hereafter. The target value our CNNs shall predict is the average magnetization per qubit: <starteqn> m_{\boldsymbol{z}}=\frac{1}{N}\sum_{n=1}^{N}z_{n}\equiv\frac{1}{N}\sum_{n=1}^{N}\left<\psi_{\textrm{out}}\right|Z_{n}\left|\psi_{\textrm{out}}\right>\,; <endeqn> \left|\psi_{\textrm{out}}\right> is the output state of the quantum circuit after the application of P layers of gates on the input state \left|\psi_{\textrm{in}}\right>=\left|0\right>^{\otimes N} . For each circuit, the target value is exactly determined via state-vector simulations. We also numerically emulate the execution of a noisy quantum computer.'
- paper_id: '2404.07802'
  equation_id: '12'
  equation: m_{\boldsymbol{z}^{\mathrm{(noisy)}}}=\frac{1}{N}\sum_{n=1}^{N}z_{n}^{\mathrm{(noisy)}}
  window: 'These noisy expectation values might help the networks predicting the corresponding ground-truth results. Hence, we provide them as a further input to the CNNs, in addition to the classical circuit descriptors \boldsymbol{\theta} and \boldsymbol{q} . This combination of (here, simulated) quantum data and classical circuit-features allows overcoming previous approaches that either used classical descriptors only, or error-mitigated same-size circuit outputs, without exploiting scalable classical networks. Clearly, with our approach we aim to obtain predictions that at least outperform the accuracy of the trivial estimation: <starteqn> m_{\boldsymbol{z}^{\mathrm{(noisy)}}}=\frac{1}{N}\sum_{n=1}^{N}z_{n}^{\mathrm{(noisy)}} <endeqn> In the following, it will be useful to tune the amount of noise in the circuit outputs. Specifically, we choose to focus on the errors associated with the CNOT gates, which are dominant compared to other errors, e.g. those associated with the single-qubit rotations or with readout operations. Our procedure to tune the noise level is described in Appendix A .'
- paper_id: '2404.07802'
  equation_id: '13'
  equation: \mathcal{L}=\frac{1}{K_{\mathrm{train}}}\sum_{k=1}^{K_{\mathrm{train}}}\left(y_{k}-\tilde{y}_{k}\right)^{2}\
  window: 'Indeed, when tested on larger circuits, the network would encounter configurations involving connections among qubits that were not part of its training data, making scalability impractical. To address this limitation, the CNN is trained on circuits implemented on randomly-selected consecutive portions of the Guadalupe chip, as illustrated in Fig. 1 . In other words, the CNN is trained with varying combinations of \boldsymbol{q} . The training of the CNN is performed by minimizing the mean squared error loss-function: <starteqn> \mathcal{L}=\frac{1}{K_{\mathrm{train}}}\sum_{k=1}^{K_{\mathrm{train}}}\left(y_{k}-\tilde{y}_{k}\right)^{2}\ <endeqn> where K_{\mathrm{train}} is the number of instances included in the training set, y_{k}=m_{\boldsymbol{z},k} is the target value, and \tilde{y}_{k} is the corresponding predicted value. The network parameters are optimized via a widely used form of stochastic gradient descent, namely, the ADAM algorithm [ 37 ] . where \bar{y} is the average of the target values and K_{\mathrm{test}} is the number of instances in the test set.'
- paper_id: '2406.14642'
  equation_id: '1'
  equation: \hat{\mathcal{H}}\left|\left.\kern-1.2pt\Psi\right>\right>=0
  window: 'In this paper, we shall explore a timeless approach in quantum theory known as the Page–Wootters construction [ 8 ] , which explains time as an entanglement phenomenon. Here, we provide a brief description of the Page–Wootters construction, based on modern understandings of it, such as those presented in Refs. [ 9 , 10 ] . The Page–Wootters construction is motivated by the superselection rule for energy, which prohibits coherent superpositions of the eigenstates of the Hamiltonian, \hat{\mathcal{H}} . As such, we make the following two assumptions: first, for simplicity, we assume that the universe is in a pure state, described at the initial time \lambda=0 by a state vector \left|\left.\kern-1.2pt\Psi\right>\right> , which we will henceforth refer to as the universal state vector ; second, to ensure compatibility with the superselection rule, we assume that the universal state vector is an eigenstate of \hat{\mathcal{H}} with eigenvalue zero: <starteqn> \hat{\mathcal{H}}\left|\left.\kern-1.2pt\Psi\right>\right>=0 <endeqn> where \left|\left.\kern-1.2pt\cdot\right>\right> indicates that a vector resides in the full Hilbert space rather than merely in one of its subspaces. Note that the zero-energy assumption is merely convenient, as the construction works for any eigenvalue of \hat{\mathcal{H}} [ 9 ] . The universe described by \left|\left.\kern-1.2pt\Psi\right>\right> is a closed system, so it evolves unitarily according to the unitary operator e^{-i\hat{\mathcal{H}}\lambda} , where \lambda is the time parameter.'
- paper_id: '2406.14642'
  equation_id: '2'
  equation: \left<\left<\Psi\right|\right.\kern-1.2pte^{i\hat{\mathcal{H}}\lambda}\hat{A}e^{-i\hat{\mathcal{H}}\lambda}\left|\left.\kern-1.2pt\Psi\right>\right>=\left<\left<\Psi\right|\right.\kern-1.2pt\hat{A}\left|\left.\kern-1.2pt\Psi\right>\right>
  window: 'This means that if \left|\left.\kern-1.2pt\Psi\right>\right> is the state of the universe at time \lambda=0 , then its state at a general time \lambda is given by e^{-i\hat{\mathcal{H}}\lambda}\left|\left.\kern-1.2pt\Psi\right>\right> . An energy eigenstate is a stationary state so that e^{-i\hat{\mathcal{H}}\lambda}\left|\left.\kern-1.2pt\Psi\right>\right>=\left|% \left.\kern-1.2pt\Psi\right>\right> , as follows from from <other_eqref>. Therefore, the assumption that the universe is in an eigenstate of \hat{\mathcal{H}} ensures that no measurable quantity depends on \lambda . Consider, for example, the expectation value of an arbitrary observable \hat{A} at an arbitrary time \lambda , which is equal to its expectation value at \lambda=0 since <starteqn> \left<\left<\Psi\right|\right.\kern-1.2pte^{i\hat{\mathcal{H}}\lambda}\hat{A}e^{-i\hat{\mathcal{H}}\lambda}\left|\left.\kern-1.2pt\Psi\right>\right>=\left<\left<\Psi\right|\right.\kern-1.2pt\hat{A}\left|\left.\kern-1.2pt\Psi\right>\right> <endeqn> Evidently, the expectation value of any observable at any time \lambda is equivalent to its expectation value at \lambda=0 , so the time parameter might as well not be there at all. How, then, can it be that there appears to be evolution and change in the real universe? To explain this, Page & Wootters assumed that the universe can be divided into two non-interacting subsystems: a clock, \mathcal{C} , with Hilbert space \mathscr{H}_{\mathcal{C}} , and the rest of the universe, \mathcal{R} , with Hilbert space \mathscr{H}_{\mathcal{R}} , where the latter system might in turn consist of further subsystems. \mathcal{C} and \mathcal{R} jointly constitute the entire universe so that the Hilbert space of the universe is \mathscr{H}_{U}=\mathscr{H}_{\mathcal{C}}\otimes\mathscr{H}_{\mathcal{R}} .'
