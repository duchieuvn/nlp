  window: The important conclusion that follows from this is that the renormalization outside the string core at r=0 is reduced to the one in dS spacetime. The VEVs in the latter geometry are well investigated in the literature. Let us consider a local observable of quantum vacuum given by the operator F(x) at the spacetime point x=(\tau,r,\phi,z) . For the geometry ( 2 ) the corresponding expectation value in the vacuum state \left|0\right\rangle can be decomposed as <starteqn> \left\langle 0\right|F(x)\left|0\right\rangle\equiv\left\langle F(x)\right\rangle=\left\langle F(x)\right\rangle_{\mathrm{dS}}+\left\langle F(x)\right\rangle_{\mathrm{cs}} <endeqn> Here, \left\langle F(x)\right\rangle_{\mathrm{dS}} is the corresponding VEV in dS spacetime when the cosmic string is absent and the contribution \left\langle F(x)\right\rangle_{\mathrm{cs}} describes the effects induced by the CS. In the region r>0 the latter is finite and the renormalization is required for the first part only. The renormalization of different physical observables in dS spacetime has been widely considered in the literature and in the discussion below we are mainly interested in the topological contribution \left\langle F(x)\right\rangle_{\mathrm{cs}} .
